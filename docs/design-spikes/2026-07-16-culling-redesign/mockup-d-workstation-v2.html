<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Teststrip — Cull Mockup D · Workstation v2</title>
<style>
/* ============================================================
   Mockup D — "Workstation v2" (round 2 of Mockup A)
   Round-2 feedback baked in:
   1. No left rail — you are all-in on the current burst. The
      burst-aware bottom strip is the only frame-navigation
      surface: active stack expanded to generous thumbnails,
      neighbors collapsed to count pills / single thumbs.
   2. No curated names anywhere — on-screen stack labels are
      machine-derivable facts only (file range · count · time).
      The quoted dataset names drive placeholder ART only.
   3. One home per fact:
        stage      → the photograph (+ transient shimmer/toast)
        right panel→ every machine read (verdict, rationale,
                     signal bars, face close-ups)
        strip      → navigation + decision state (✦ ✨ P/X,
                     rank tint, skip marks, stars)
        status bar → position / progress / scope / auto-advance
   ============================================================ */
:root{
  --bg:#0b0c0f; --stage:#08090c; --panel:#12141a; --panel2:#181b22;
  --line:#252a34; --line2:#2e3442;
  --txt:#cfd4dd; --dim:#828a99; --faint:#5a6272;
  --acc:#57d0b8;           /* navigation / current */
  --gold:#e6b354;          /* ✦ recommendation */
  --pick:#4cd08a;          /* user pick */
  --rej:#ef6461;           /* user reject */
  --ghost:#b78df2;         /* ✨ tentative */
  --amber:#d9a13c;         /* mixed / too-close */
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);
  font:11px/1.45 var(--sans);-webkit-font-smoothing:antialiased}
kbd{font:10px var(--mono);background:#1d212b;border:1px solid var(--line2);
  border-bottom-width:2px;border-radius:3px;padding:1px 5px;color:var(--txt);white-space:nowrap}
button{font:inherit;color:inherit;background:var(--panel2);border:1px solid var(--line2);
  border-radius:4px;padding:5px 12px;cursor:pointer}
button:hover{border-color:var(--acc);color:#fff}
button:focus-visible{outline:2px solid var(--acc);outline-offset:1px}
.microlabel{font:9px var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}

#app{height:100vh;display:grid;
  grid-template-columns:minmax(0,1fr) 300px;
  grid-template-rows:34px minmax(0,1fr) 152px 30px auto;
  grid-template-areas:"top top" "center right" "strip strip" "status status" "hint hint"}

/* ---------- top bar ---------- */
#topbar{grid-area:top;display:flex;align-items:center;gap:12px;padding:0 12px;
  background:var(--panel);border-bottom:1px solid var(--line)}
#topbar .brand{font:10px var(--mono);letter-spacing:.22em;color:var(--acc)}
#topbar .batch{font-weight:600;font-size:12px;color:#e8ebf0}
#topbar .lens{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--dim)}
#topbar .lens b{color:var(--txt);font-weight:600}

/* ---------- center stage: the photograph, nothing else ---------- */
#center{grid-area:center;display:flex;flex-direction:column;min-width:0;background:var(--stage)}
#stagebox{flex:1;position:relative;display:flex;align-items:center;justify-content:center;
  padding:14px 18px;min-height:0}
#stagewrap{position:relative;height:100%;aspect-ratio:3/2;max-width:100%;border-radius:6px;
  overflow:hidden;background:#000;box-shadow:0 0 0 1px var(--line),0 12px 40px rgba(0,0,0,.5)}
#art{position:absolute;inset:0;transition:transform .16s ease-out;will-change:transform}
#art svg{width:100%;height:100%;display:block}
#stagewrap.zoomed{cursor:grab}
#stagewrap.zoomed:active{cursor:grabbing}
#shimmer{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
  background:rgba(8,9,12,.72);z-index:5}
#shimmer.on{display:flex}
#shimmer .sheen{position:absolute;inset:0;background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.09) 50%,transparent 60%);
  background-size:250% 100%;animation:sheen .7s linear infinite}
#shimmer .word{font:11px var(--mono);color:var(--dim);letter-spacing:.2em;z-index:1}
#shimmer.flash .word{animation:flashword .22s ease-out}
@keyframes sheen{from{background-position:120% 0}to{background-position:-120% 0}}
@keyframes flashword{0%{transform:scale(1);color:var(--dim)}40%{transform:scale(1.35);color:#fff}100%{transform:scale(1)}}
@media (prefers-reduced-motion:reduce){#shimmer .sheen{animation:none;background:rgba(255,255,255,.05)}}
#toast{position:absolute;left:50%;bottom:26px;transform:translateX(-50%) translateY(8px);
  font:11px var(--mono);background:#1a1e27;border:1px solid var(--line2);border-radius:5px;
  padding:6px 14px;opacity:0;transition:opacity .18s,transform .18s;pointer-events:none;z-index:8;
  box-shadow:0 6px 20px rgba(0,0,0,.5)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---------- right panel: the only home of machine reads ---------- */
#right{grid-area:right;background:var(--panel);border-left:1px solid var(--line);
  overflow-y:auto;display:flex;flex-direction:column}
.rpsec{padding:8px 12px;border-bottom:1px solid var(--line)}
.rphead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.rphead .k{font:9px var(--mono);color:var(--faint)}
#facearea{height:148px;overflow-y:auto} /* reserved: no reflow between faces / no-faces / hidden */
.facegrid{display:flex;flex-wrap:wrap;gap:8px}
.facechip{width:46px;text-align:center}
.facechip .fc{width:44px;height:44px;border-radius:6px;display:flex;align-items:center;
  justify-content:center;font-size:22px;position:relative;border:2px solid var(--pick)}
.facechip .fc.shut{border-color:var(--rej)}
.facechip .fc.kissok{border-color:var(--pick)}
.facechip .fc .fdot{position:absolute;right:2px;top:2px;width:7px;height:7px;border-radius:50%;
  border:1px solid rgba(0,0,0,.5)}
.facechip .fc .fdot.sharp{background:var(--acc)}
.facechip .fc .fdot.soft{background:var(--amber)}
.facechip .fl{font:8px var(--mono);margin-top:3px;color:var(--dim)}
.facechip .fl.shut{color:var(--rej)}
.facechip .fl.kissok{color:var(--pick)}
.facestate{height:100%;display:flex;align-items:center;justify-content:center;
  color:var(--faint);font-style:italic;text-align:center;padding:0 10px}
.facenote{padding-top:6px;text-align:center;color:var(--pick)}
#verdict{margin:2px 0 8px}
.pill{display:block;font:11px var(--mono);padding:5px 12px;border-radius:99px;
  border:1px solid var(--line2);background:var(--panel2);color:var(--txt);text-align:center;
  white-space:normal;line-height:1.4}
.pill.keep{border-color:rgba(87,208,184,.45);color:#8fe6d2}
.pill.toss{border-color:rgba(239,100,97,.45);color:#f4938f}
.pill.mixed{border-color:rgba(217,161,60,.45);color:#e5bc72}
.pill.close{border-color:rgba(217,161,60,.6);color:var(--amber);font-weight:600}
.pill.none{border-style:dashed;color:var(--faint);font-style:italic}
.sigrow{display:grid;grid-template-columns:44px 1fr 74px;gap:8px;align-items:center;margin:7px 0}
.sigrow .sn{font:9px var(--mono);letter-spacing:.1em;color:var(--dim)}
.sigrow .bar{height:5px;background:#1d212b;border-radius:3px;overflow:hidden}
.sigrow .bar i{display:block;height:100%;border-radius:3px;background:var(--acc)}
.sigrow .bar.na{background:repeating-linear-gradient(90deg,#1d212b 0 4px,#14161c 4px 8px)}
.sigrow .sv{font:10px var(--mono);color:var(--txt);text-align:right}
.sigrow .sv small{color:var(--faint);font-size:8px}
.rationale{margin-top:8px;padding:7px 9px;border-radius:4px;background:var(--panel2);
  border:1px solid var(--line);color:var(--dim);font-size:10.5px;line-height:1.5}
.rationale.noread{color:var(--faint);font-style:italic}
.ghostnote{margin-top:6px;padding:6px 9px;border-radius:4px;border:1px dashed rgba(183,141,242,.5);
  color:var(--ghost);font-size:10px;background:rgba(183,141,242,.06)}

/* ---------- the strip: the only frame-navigation surface ---------- */
#strip{grid-area:strip;background:var(--panel);border-top:1px solid var(--line);
  overflow-x:auto;overflow-y:hidden;display:flex;align-items:flex-end;gap:10px;
  padding:6px 14px 8px}
.sactive{display:flex;flex-direction:column;flex:none;padding:0 10px;
  border-left:1px solid var(--line2);border-right:1px solid var(--line2)}
.slabel{display:flex;gap:10px;align-items:baseline;margin-bottom:5px;white-space:nowrap}
.slabel .ltxt{font:600 10px var(--mono);letter-spacing:.05em;color:#e8ebf0}
.slabel .ldone{font:9px var(--mono);color:var(--pick)}
.slabel .lg{display:flex;align-items:center;gap:5px;font:8px var(--mono);color:var(--faint)}
.slabel .lg .grad{width:46px;height:4px;border-radius:2px;
  background:linear-gradient(90deg,#3ecf8e,#d9a13c,#e05252)}
.slabel .lgnote{font:8px var(--mono);color:var(--faint);font-style:italic}
.cells{display:flex;gap:6px}
.bigcell{width:140px;height:104px;border-radius:5px;position:relative;cursor:pointer;flex:none;
  border:1px solid var(--line2);overflow:hidden;font:10px var(--mono)}
.bigcell .bgart{position:absolute;inset:0}
.bigcell .bgart svg{width:100%;height:100%;display:block}
.bigcell.cur{border-color:var(--acc);box-shadow:0 0 0 2px var(--acc)}
.bigcell.dimmed{opacity:.25}
.bigcell .n{position:absolute;left:6px;top:4px;color:#eef1f5;text-shadow:0 1px 2px rgba(0,0,0,.85);
  font-weight:600;font-size:11px}
.bigcell .rec{position:absolute;right:5px;top:3px;color:var(--gold);font-size:13px;
  text-shadow:0 1px 3px rgba(0,0,0,.8)}
.bigcell .gho{position:absolute;right:5px;bottom:8px;color:var(--ghost);font-size:10px;
  text-shadow:0 1px 2px rgba(0,0,0,.8)}
.bigcell .skp{position:absolute;left:6px;bottom:8px;color:#c6cbd6;font-size:9px;
  text-shadow:0 1px 2px rgba(0,0,0,.8)}
.bigcell .stars{position:absolute;left:6px;bottom:20px;color:var(--gold);font-size:9px;
  text-shadow:0 1px 2px rgba(0,0,0,.8)}
.bigcell .dec{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:22px}
.bigcell .dec.P{background:rgba(76,208,138,.32);color:var(--pick)}
.bigcell .dec.X{background:rgba(239,100,97,.34);color:var(--rej)}
.bigcell .rk{position:absolute;left:0;right:0;bottom:0;height:4px}
.bigcell .rk.unscored{background:repeating-linear-gradient(90deg,var(--faint) 0 4px,transparent 4px 8px)}
.spill{flex:none;width:54px;height:104px;border-radius:6px;border:1px solid var(--line2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  cursor:pointer;position:relative;overflow:hidden}
.spill:hover,.sthumb:hover,.bigcell:hover{border-color:var(--acc)}
.spill .cnt{font:600 17px var(--mono);color:#e8ebf0;text-shadow:0 1px 2px rgba(0,0,0,.7)}
.spill .cw{font:8px var(--mono);color:rgba(232,235,240,.65);text-shadow:0 1px 2px rgba(0,0,0,.7)}
.spill .mark{font:10px var(--mono);min-height:14px}
.spill .mark.ok{color:var(--pick)}
.spill .mark.gh{color:var(--ghost)}
.spill.dimmed{opacity:.3}
.sthumb{flex:none;width:72px;height:104px;border-radius:5px;border:1px solid var(--line2);
  position:relative;overflow:hidden;cursor:pointer;font:9px var(--mono)}
.sthumb .bgart{position:absolute;inset:0}
.sthumb .bgart svg{width:100%;height:100%;display:block}
.sthumb .gho{position:absolute;right:4px;bottom:6px;color:var(--ghost);font-size:9px;
  text-shadow:0 1px 2px rgba(0,0,0,.8)}
.sthumb .skp{position:absolute;left:5px;bottom:6px;color:#c6cbd6;text-shadow:0 1px 2px rgba(0,0,0,.8)}
.sthumb .stars{position:absolute;left:5px;top:4px;color:var(--gold);font-size:8px;
  text-shadow:0 1px 2px rgba(0,0,0,.8)}
.sthumb .dec{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:16px}
.sthumb .dec.P{background:rgba(76,208,138,.32);color:var(--pick)}
.sthumb .dec.X{background:rgba(239,100,97,.34);color:var(--rej)}
.sthumb.dimmed{opacity:.3}

/* ---------- status bar ---------- */
#status{grid-area:status;display:flex;align-items:center;gap:14px;padding:0 12px;
  background:var(--panel);border-top:1px solid var(--line);font:10px var(--mono);color:var(--dim)}
#counter{color:var(--txt);white-space:nowrap}
#counter b{color:#fff;font-weight:600}
#progresswrap{display:flex;align-items:center;gap:8px;flex:1;max-width:320px}
#progressbar{flex:1;height:5px;background:#1d212b;border-radius:3px;overflow:hidden}
#progressfill{height:100%;background:var(--acc);border-radius:3px;transition:width .2s}
.schip{padding:2px 8px;border-radius:3px;border:1px solid var(--line2);white-space:nowrap}
.schip b{color:var(--txt);font-weight:600}
.schip.on b{color:var(--acc)}
.schip.off{opacity:.6}
.schip.zoom{border-color:rgba(87,208,184,.5);color:var(--acc)}
#status .spacer{flex:1}

/* ---------- hint bar ---------- */
#hint{grid-area:hint;display:flex;align-items:center;justify-content:center;gap:10px;
  padding:5px 8px;background:#0e1013;border-top:1px solid var(--line);flex-wrap:wrap}
#hint span{color:var(--faint);font-size:10px}
#hint.gone{display:none}

/* ---------- overlays ---------- */
.overlay{position:fixed;inset:0;background:rgba(5,6,8,.78);display:none;
  align-items:center;justify-content:center;z-index:50}
.overlay.on{display:flex}
.card{background:var(--panel);border:1px solid var(--line2);border-radius:10px;
  padding:22px 26px;max-width:640px;width:92%;max-height:86vh;overflow-y:auto;
  box-shadow:0 24px 80px rgba(0,0,0,.7)}
.card h2{font-size:15px;font-weight:600;color:#fff;margin-bottom:2px}
.card .sub{color:var(--dim);font-family:var(--mono);font-size:10px;margin-bottom:14px}
.kmsec{margin-bottom:12px}
.kmsec h3{font:9px var(--mono);letter-spacing:.16em;text-transform:uppercase;
  color:var(--acc);margin-bottom:6px}
.kmgrid{display:grid;grid-template-columns:1fr 1fr;gap:3px 22px}
.kmrow{display:flex;gap:8px;align-items:baseline;font-size:11px}
.kmrow .kk{min-width:74px;text-align:right}
.kmrow .kd{color:var(--dim)}
.kmsec.stub .kmrow{opacity:.45}
.sumrow{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:5px;
  font-size:12px;cursor:pointer}
.sumrow:hover{background:var(--panel2)}
.sumrow .num{font:600 13px var(--mono);min-width:38px;text-align:right}
.sumrow .lbl{flex:1}
.sumrow .jump{color:var(--faint);font-size:10px}
.sumrow.p .num{color:var(--pick)} .sumrow.x .num{color:var(--rej)}
.sumrow.u .num{color:var(--txt)} .sumrow.s .num{color:var(--dim)}
.sumrow.n .num{color:var(--amber)} .sumrow.g .num{color:var(--ghost)}
.ceremonies{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;padding-top:14px;
  border-top:1px solid var(--line)}
.footnote{margin-top:12px;color:var(--faint);font-size:10px;line-height:1.5}
.revstack{margin-bottom:12px}
.revstack h4{font:600 11px var(--mono);color:var(--txt);margin-bottom:4px}
.revrow{display:flex;gap:10px;align-items:baseline;padding:3px 6px;font-size:11px}
.revrow .rgk{font:10px var(--mono);color:var(--ghost);min-width:28px}
.revrow .rgn{color:var(--dim);flex:1}
.revrow .rgs{font:9px var(--mono)}
.revrow .rgs.await{color:var(--ghost)}
.revrow .rgs.replaced{color:var(--faint);text-decoration:line-through}
.stubmsg{font-size:12px;line-height:1.6;color:var(--txt);margin-bottom:14px}
.stubmsg em{color:var(--ghost);font-style:normal}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:#262b36;border-radius:4px}
::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <span class="brand">TESTSTRIP · CULL</span>
    <span class="batch">June 14 — Red Rocks wedding + archive strays</span>
    <span class="lens">lens <b>Everything</b> · 0 hidden</span>
  </div>
  <div id="center">
    <div id="stagebox">
      <div id="stagewrap">
        <div id="art"></div>
        <div id="shimmer"><div class="sheen"></div><div class="word">RENDERING…</div></div>
      </div>
      <div id="toast"></div>
    </div>
  </div>
  <div id="right">
    <div class="rpsec">
      <div class="rphead"><span class="microlabel">Close-ups</span><span class="k" id="facecount"></span></div>
      <div id="facearea"></div>
    </div>
    <div class="rpsec">
      <div class="rphead"><span class="microlabel">Reads</span></div>
      <div id="verdict"></div>
      <div id="signals"></div>
      <div class="rationale" id="rationale"></div>
      <div id="ghostslot"></div>
    </div>
  </div>
  <div id="strip"></div>
  <div id="status">
    <span id="counter"></span>
    <div id="progresswrap"><div id="progressbar"><div id="progressfill"></div></div><span id="progresstext"></span></div>
    <span class="spacer"></span>
    <span class="schip zoom" id="zoomchip">Z 2× · ⇧arrows / drag pan</span>
    <span class="schip" id="scopechip"></span>
    <span class="schip" id="autochip"></span>
    <span class="schip">? keys</span>
  </div>
  <div id="hint">
    <span><kbd>→</kbd><kbd>←</kbd> stacks</span><span><kbd>↓</kbd><kbd>↑</kbd> frames</span>
    <span><kbd>P</kbd> pick</span><span><kbd>X</kbd> reject</span><span><kbd>U</kbd> clear</span>
    <span><kbd>⏎</kbd> commit stack</span><span><kbd>␣</kbd> skip</span>
    <span><kbd>Z</kbd> zoom</span><span><kbd>/</kbd> faces</span><span><kbd>1–5</kbd> stars</span>
    <span><kbd>A</kbd> auto</span><span><kbd>S</kbd> scope</span><span><kbd>⌘Z</kbd> undo</span>
    <span><kbd>?</kbd> all keys (hides this bar)</span>
  </div>
</div>

<div class="overlay" id="ovkeys"><div class="card" id="keyscard"></div></div>
<div class="overlay" id="ovcomplete"><div class="card" id="completecard"></div></div>
<div class="overlay" id="ovreview"><div class="card" id="reviewcard"></div></div>
<div class="overlay" id="ovstub"><div class="card" id="stubcard"></div></div>

<script>
"use strict";
/*CORE-START*/
/* ============================================================
   CORE — pure data + state machine. No DOM. Testable under
   node/jsc by extracting between the CORE markers. Carried
   over from Mockup A's verified core; round-2 diffs: per-stack
   capture times + machine-fact stack labels (stackLabel), and
   the undo toast names stacks by machine label, never by the
   dataset's art-only shorthand names.
   ============================================================ */

// ---- Dataset: exactly the shared-spec 35 frames / 9 stops ----
// `name` is dataset shorthand for the placeholder ART only — the
// UI must never display it (round-1 labeling rule). `time` is the
// capture-time machine fact shown in strip labels.
const STACKS = [
  { key:"lineup", name:"Lineup", kind:"lineup", hue:174, sat:34, faces:8, rec:2, time:"14:02",
    frames:[
      {file:"RR14_0412.RAF", focus:.82, eyes:1,   smile:.72, blur:0,   rankT:.2, pill:"Keep read 76% · eyes open",                        shut:[]},
      {file:"RR14_0413.RAF", focus:.85, eyes:.75, smile:.70, blur:0,   rankT:.8, pill:"Mixed read 66% · 2 eyes shut",                     shut:[1,5]},
      {file:"RR14_0414.RAF", focus:.88, eyes:1,   smile:.78, blur:0,   rankT:0,  pill:"Keep read 84% · sharpest in stack · all eyes open", shut:[]},
      {file:"RR14_0415.RAF", focus:.79, eyes:.5,  smile:.55, blur:1.2, rankT:1,  pill:"Toss read 62% · 2 eyes shut · softer",             shut:[1,3,5,6], ghost:"X", ghostNote:"2 eyes shut · softer"},
      {file:"RR14_0416.RAF", focus:.84, eyes:.88, smile:.74, blur:0,   rankT:.6, pill:"Keep read 71% · one blink",                        shut:[4]},
      {file:"RR14_0417.RAF", focus:.81, eyes:1,   smile:.76, blur:0,   rankT:.4, pill:"Keep read 74% · eyes open",                        shut:[]},
    ]},
  { key:"venue", name:"Venue wide", kind:"venue", hue:38, sat:42, faces:0, rec:null, time:"14:31",
    frames:[{file:"RR14_0428.RAF", focus:.90, eyes:null, smile:null, blur:0, rankT:null, pill:"Keep read 78% · sharp"}]},
  { key:"kiss", name:"First kiss", kind:"kiss", hue:345, sat:36, faces:2, rec:5, time:"15:04",
    frames:[
      {file:"RR14_0431.RAF", focus:.78, eyes:1,   smile:.35, blur:.6, rankT:.75,  pill:"Mixed read 60% · approach",                          shut:[]},
      {file:"RR14_0432.RAF", focus:.80, eyes:1,   smile:.40, blur:0,  rankT:.625, pill:"Keep read 66%",                                      shut:[]},

// Flatten to the 35-frame walk, capture order.
const FRAMES = [];
STACKS.forEach((st, si) => {
  st.start = FRAMES.length;
  st.n = st.frames.length;
  st.frames.forEach((f, i) => {
    f.si = si; f.idx = i; f.gi = FRAMES.length;
    f.tooClose = !!(st.tooClose && st.tooClose.includes(i));
    f.rec = (st.rec === i);
    FRAMES.push(f);
  });
});
const TOTAL = FRAMES.length;          // 35
const NSTACKS = STACKS.length;        // 9
const SCOPES = ["all","undecided","picks","rejects"]; // S cycles these

// ---- Machine-fact labels (the ONLY on-screen stack identity) ----
// Stacks are auto-grouped; nobody has named anything. Labels are
// derivable facts: file range + frame count + capture time.
function baseName(file){ return file.replace(/\.[^.]+$/, ""); }
function rangeLabel(st){
  const a = baseName(st.frames[0].file), b = baseName(st.frames[st.n - 1].file);
  if(st.n === 1) return a;
  const ma = a.match(/^(.*?)(\d+)$/), mb = b.match(/^(.*?)(\d+)$/);
  if(ma && mb && ma[1] === mb[1]) return `${a}–${mb[2]}`;
  let p = 0; while(p < a.length && a[p] === b[p]) p++;
  return `${a}–${b.slice(p)}`;
}
function stackLabel(st){
  return st.n > 1 ? `${rangeLabel(st)} · ${st.n} · ${st.time}`
                  : `${rangeLabel(st)} · ${st.time}`;
}

function initState(){
  const s = { cur:-1, dec:{}, stars:{}, skipped:{}, viewed:{}, history:[],
              scope:"all", autoAdv:true };
  gotoFrame(s, landing(0));            // run opens on stack 1's ✦
  return s;
}
function stackOf(fi){ return STACKS[FRAMES[fi].si]; }
function landing(si){                  // land-on-✦, honest fallback to frame 1
  const st = STACKS[si];
  return st.rec != null ? st.start + st.rec : st.start;
}
function gotoFrame(s, fi){ s.cur = fi; s.viewed[fi] = 1; }

function inScope(s, fi){
  const d = s.dec[fi];
  switch(s.scope){
    case "all":       return true;
    case "undecided": return !d;
    case "picks":     return d === "P";
    case "rejects":   return d === "X";
    case "skipped":   return !d && !!s.skipped[fi];
    case "never":     return !d && !s.viewed[fi];
    default:          return true;
  }
}
function stackScopeFrames(s, si){
  const st = STACKS[si], out = [];
  for(let i = st.start; i < st.start + st.n; i++) if(inScope(s, i)) out.push(i);
  return out;
}

// ---- Navigation ----
function nextStack(s){
  const si = FRAMES[s.cur].si;
  for(let j = si + 1; j < NSTACKS; j++){
    const fs = stackScopeFrames(s, j);
    if(fs.length){
      const land = landing(j);
      gotoFrame(s, fs.includes(land) ? land : fs[0]);
      return {};
    }
  }
  return { completed:true };           // walked past the end → summary
}
function prevStack(s){
  const si = FRAMES[s.cur].si;
  for(let j = si - 1; j >= 0; j--){
    const fs = stackScopeFrames(s, j);
    if(fs.length){
      const land = landing(j);
      gotoFrame(s, fs.includes(land) ? land : fs[0]);
      return {};
    }
  }
  return {};
}
function nextFrame(s){                 // ↓/J: within stack; photo-walk on singles
  const f = FRAMES[s.cur], st = STACKS[f.si];
  if(st.n > 1){
    for(let i = s.cur + 1; i < st.start + st.n; i++)
      if(inScope(s, i)){ gotoFrame(s, i); return {}; }
    return {};                         // clamped at stack edge
  }
  for(let i = s.cur + 1; i < TOTAL; i++)
    if(inScope(s, i)){ gotoFrame(s, i); return {}; }
  return {};
}
function prevFrame(s){
  const f = FRAMES[s.cur], st = STACKS[f.si];
  if(st.n > 1){
    for(let i = s.cur - 1; i >= st.start; i--)
      if(inScope(s, i)){ gotoFrame(s, i); return {}; }
    return {};
  }
  for(let i = s.cur - 1; i >= 0; i--)
    if(inScope(s, i)){ gotoFrame(s, i); return {}; }
  return {};
}

// ---- Decisions ----
function decide(s, d){                 // d: 'P' | 'X' | null (U)
  const fi = s.cur, prev = s.dec[fi] || null;
  if(prev !== (d || null)){            // only real changes enter the undo history
    s.history.push({ type:"decide", changes:[{fi, prev}], prevCur:fi });
    if(d) s.dec[fi] = d; else delete s.dec[fi];
  }
  if(d && s.autoAdv){
    const st = STACKS[FRAMES[fi].si];
    // next undecided in this stack: forward first, then wrap
    for(let i = fi + 1; i < st.start + st.n; i++)
      if(!s.dec[i]){ gotoFrame(s, i); return {}; }
    for(let i = st.start; i < fi; i++)
      if(!s.dec[i]){ gotoFrame(s, i); return {}; }
    return nextStack(s);               // stack fully decided → carry on
  }
  return {};
}
function skip(s){                      // Space: always decision-free
  const fi = s.cur, f = FRAMES[fi], st = STACKS[f.si];
  if(!s.dec[fi]) s.skipped[fi] = 1;
  if(st.n > 1){
    for(let i = fi + 1; i < st.start + st.n; i++)
      if(inScope(s, i)){ gotoFrame(s, i); return {}; }
  }
  return nextStack(s);
}
function commit(s){                    // Return: the one-key-per-burst cadence
  const fi = s.cur, f = FRAMES[fi], st = STACKS[f.si];
  const changes = [];
  if(st.n === 1){
    changes.push({fi, prev: s.dec[fi] || null});
    s.dec[fi] = "P";
    s.history.push({ type:"commit", changes, prevCur:fi, single:true });
    const eff = nextStack(s);
    return { ...eff, toast:"Picked · advancing", committed:true };
  }
  for(let i = st.start; i < st.start + st.n; i++){
    const want = (i === fi) ? "P" : (s.dec[i] || "X");   // keep current + already-picked; reject undecided (ghosts count for nothing)
    if((s.dec[i] || null) !== want){ changes.push({fi:i, prev: s.dec[i] || null}); s.dec[i] = want; }
  }
  s.history.push({ type:"commit", changes, prevCur:fi });
  let kept = 0, rej = 0;
  for(let i = st.start; i < st.start + st.n; i++){
    if(s.dec[i] === "P") kept++; else if(s.dec[i] === "X") rej++;
  }
  const eff = nextStack(s);
  return { ...eff, toast:`Kept ${kept} · rejected ${rej}`, committed:true };
}
function undo(s){                      // a stack commit undoes as ONE unit
  const e = s.history.pop();
  if(!e) return { toast:"Nothing to undo" };
  e.changes.forEach(c => { if(c.prev) s.dec[c.fi] = c.prev; else delete s.dec[c.fi]; });
  gotoFrame(s, e.prevCur);
  return { toast: e.type === "commit"
      ? `Undid stack commit — ${stackLabel(stackOf(e.prevCur))} restored`
      : "Undid decision" };
}
function setStars(s, n){ if(n) s.stars[s.cur] = n; else delete s.stars[s.cur]; }
function cycleScope(s){
  const i = SCOPES.indexOf(s.scope);
  s.scope = SCOPES[(i + 1) % SCOPES.length];   // special jump scopes cycle back via 'all'
  if(i === -1) s.scope = "all";
}

// ---- Accounting (disjoint buckets over all 35) ----
function counts(s){
  let picked=0, rejected=0, undecided=0, skipped=0, never=0;
  for(let i = 0; i < TOTAL; i++){
    const d = s.dec[i];
    if(d === "P") picked++;
    else if(d === "X") rejected++;
    else if(!s.viewed[i]) never++;
    else if(s.skipped[i]) skipped++;
    else undecided++;
  }
  return { picked, rejected, undecided, skipped, never,
           ghosts: ghostsAwaiting(s).length };
}
function allGhosts(){ return FRAMES.filter(f => f.ghost); }
function ghostsAwaiting(s){ return allGhosts().filter(f => !s.dec[f.gi]); }
function stackDecided(s, si){
  const st = STACKS[si];
  for(let i = st.start; i < st.start + st.n; i++) if(!s.dec[i]) return false;
  return true;
}
/*CORE-END*/

        <span class="fl ${cls}">${lbl}</span></span>`;
    }
    const note = f.kissOK ? `<div class="facenote">eyes shut — OK in a kiss</div>` : "";
    fa.innerHTML = `<div class="facegrid">${chips}</div>${note}`;
  }
  // verdict — the read pill lives here now, not over the stage
  let cls = "none", txt = "No read yet";
  if(f.pill){
    txt = f.pill;
    cls = f.tooClose ? "close"
        : f.pill.startsWith("Keep") ? "keep"
        : f.pill.startsWith("Toss") ? "toss" : "mixed";
    if(cls === "close") txt = "≈ " + txt;
  }
  $("verdict").innerHTML = `<span class="pill ${cls}">${txt}</span>`;
  // signals
  const sig = (name, v, tag) => {
    if(v == null) return `<div class="sigrow"><span class="sn">${name}</span><span class="bar na"></span><span class="sv"><small>—</small></span></div>`;
    return `<div class="sigrow"><span class="sn">${name}</span>
      <span class="bar"><i style="width:${Math.round(v*100)}%"></i></span>
      <span class="sv">${v.toFixed(2)}${tag?` <small>${tag}</small>`:""}</span></div>`;
  };
  $("signals").innerHTML =
    sig("FOCUS", f.focus ?? null) +
    sig("EYES",  f.eyes  ?? null, f.kissOK ? "shut·OK" : null) +
    sig("SMILE", f.smile ?? null);
  // rationale — explains the read's honesty; never repeats the verdict
  const rat = $("rationale");
  if(!f.pill){
    rat.className = "rationale noread";
    rat.textContent = "No signals have run on this frame — the mode won't invent a verdict.";
  } else if(f.tooClose){
    rat.className = "rationale";
    rat.textContent = "The top frames are within the signals' noise floor — no ✦ is awarded that the read can't defend. C compares them head-to-head (not in this mockup).";
  } else {
    rat.className = "rationale";
    rat.textContent = "Claims are score-gated — a signal appears only when it genuinely separates the frames.";
  }
  $("ghostslot").innerHTML = (f.ghost && !S.dec[S.cur])
    ? `<div class="ghostnote">✨${f.ghost} autopilot: ${f.ghostNote} — tentative; counts for nothing until you review it.</div>` : "";
}

// ---------- burst-aware strip: the only navigation surface ----------
function bigCellHTML(fi){
  const f = FRAMES[fi], st = STACKS[f.si], d = S.dec[fi];
  const rk = f.rankT != null ? rankColor(f.rankT) : null;
  const stn = S.stars[fi];
  return `<span class="bigcell${fi===S.cur?" cur":""}${!inScope(S,fi)?" dimmed":""}" data-fi="${fi}">
    <span class="bgart">${motif(st, f)}</span>
    <span class="n">${f.idx+1}</span>
    ${f.rec?'<span class="rec">✦</span>':""}
    ${(f.ghost && !d)?`<span class="gho">✨${f.ghost}</span>`:""}
    ${(S.skipped[fi] && !d)?'<span class="skp">› skipped</span>':""}
    ${stn?`<span class="stars">${"★".repeat(stn)}</span>`:""}
    ${d?`<span class="dec ${d}">${d}</span>`:""}
    ${rk?`<span class="rk" style="background:${rk.solid}"></span>`:'<span class="rk unscored"></span>'}</span>`;
}
function renderStrip(){
  const curSi = FRAMES[S.cur].si;
  let h = "";
  STACKS.forEach((st, si) => {
    const done = stackDecided(S, si);
    const gh = st.frames.filter(f => f.ghost && !S.dec[f.gi]).length;
    if(si === curSi){
      // the active stop, expanded — big enough to genuinely compare
      let cells = "";
      for(let i = st.start; i < st.start + st.n; i++) cells += bigCellHTML(i);
      const legend = st.n > 1
        ? (st.unscored
            ? `<span class="lgnote">unranked — no read yet</span>`
            : `<span class="lg"><span>best</span><span class="grad"></span><span>worst</span></span>`)
        : "";
      h += `<div class="sactive"><div class="slabel"><span class="ltxt">${stackLabel(st)}</span>
        ${done?'<span class="ldone">✓ decided</span>':""}${legend}</div>
        <div class="cells">${cells}</div></div>`;
    } else if(st.n > 1){
      // neighboring burst, collapsed to a count pill
      const C = stackCols(st);
      const dim = stackScopeFrames(S, si).length === 0 ? " dimmed" : "";
      h += `<span class="spill${dim}" data-si="${si}" title="${stackLabel(st)}"
        style="background:linear-gradient(180deg,${C.bgB},${C.bgA})">
        <span class="cnt">${st.n}</span><span class="cw">frames</span>
        ${done?'<span class="mark ok">✓</span>':(gh?`<span class="mark gh">✨${gh}</span>`:'<span class="mark"></span>')}</span>`;
    } else {
      // neighboring standalone photo, a single thumb
      const f = st.frames[0], fi = f.gi, d = S.dec[fi];
      const stn = S.stars[fi];
      h += `<span class="sthumb${!inScope(S,fi)?" dimmed":""}" data-fi="${fi}" title="${stackLabel(st)}">
        <span class="bgart">${motif(st, f)}</span>
        ${(f.ghost && !d)?`<span class="gho">✨${f.ghost}</span>`:""}
        ${(S.skipped[fi] && !d)?'<span class="skp">›</span>':""}
        ${stn?`<span class="stars">${"★".repeat(stn)}</span>`:""}
        ${d?`<span class="dec ${d}">${d}</span>`:""}</span>`;
    }
  });
  $("strip").innerHTML = h;
  document.querySelectorAll("#strip .bigcell, #strip .sthumb").forEach(el =>
    el.addEventListener("click", () => uiGoto(+el.dataset.fi)));
  document.querySelectorAll("#strip .spill").forEach(el =>
    el.addEventListener("click", () => uiGoto(landing(+el.dataset.si))));
}

function renderStatus(){
  const f = FRAMES[S.cur], st = STACKS[f.si];
  $("counter").innerHTML = `<b>${S.cur+1}</b> of ${TOTAL} · stack <b>${f.si+1}</b> of ${NSTACKS} · frame <b>${f.idx+1}</b> of ${st.n} · ${f.file}`;
  const c = counts(S), dec = c.picked + c.rejected;
  $("progressfill").style.width = (dec/TOTAL*100) + "%";
  $("progresstext").textContent = `${dec}/${TOTAL} decided`;
  const scopeN = FRAMES.filter(fr => inScope(S, fr.gi)).length;
  $("scopechip").innerHTML = `S scope <b>${S.scope === "all" ? "everything" : S.scope}</b>${S.scope!=="all"?` (${scopeN})`:""}`;
  $("autochip").innerHTML = `A auto-advance <b>${S.autoAdv?"ON":"OFF"}</b>`;
  $("autochip").className = "schip " + (S.autoAdv ? "on" : "off");
  $("zoomchip").style.display = ui.zoom.on ? "inline" : "none";
  $("hint").classList.toggle("gone", ui.hintGone);
}

// ---------- action plumbing + shimmer (Return-inert gate) ----------
function act(fn){
  const prevSi = FRAMES[S.cur].si;
  const eff = fn() || {};
  if(FRAMES[S.cur].si !== prevSi){ ui.zoom.on = false; ui.zoom.x = ui.zoom.y = 50; } // zoom sticks within a stack only
  startShimmerIfNeeded();
  if(eff.toast) showToast(eff.toast);
  if(eff.completed) openComplete();
  render();
}
function uiGoto(fi){ act(() => { gotoFrame(S, fi); }); }
function startShimmerIfNeeded(){
  clearTimeout(ui.shimmerTimer);
  if(ui.renderedOnce[S.cur]){ ui.shimmer = false; return; }  // revisits are prefetched — instant
  ui.renderedOnce[S.cur] = true;
  ui.shimmer = true;
  ui.shimmerTimer = setTimeout(() => { ui.shimmer = false; $("shimmer").classList.remove("flash"); render(); }, 250);
}
function flashShimmer(){
  const el = $("shimmer");
  el.classList.remove("flash"); void el.offsetWidth; el.classList.add("flash");
  showToast("rendering… Return is inert until the frame is at decision quality");
}

// ---------- toast ----------
let toastTimer = null;
function showToast(msg){
  const t = $("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 1800);
}

// ---------- overlays ----------
function openKeys(){
  ui.keys = true; ui.hintGone = true;
  $("keyscard").innerHTML = `
    <h2>Keys</h2><div class="sub">every hover affordance has a key twin — no pointer required</div>
    <div class="kmsec"><h3>Move</h3><div class="kmgrid">
      <div class="kmrow"><span class="kk"><kbd>→</kbd> <kbd>L</kbd></span><span class="kd">next stack — lands on ✦, or frame 1 if no read</span></div>
      <div class="kmrow"><span class="kk"><kbd>←</kbd> <kbd>H</kbd></span><span class="kd">previous stack</span></div>
      <div class="kmrow"><span class="kk"><kbd>↓</kbd> <kbd>J</kbd></span><span class="kd">next frame · next photo on singles</span></div>
      <div class="kmrow"><span class="kk"><kbd>↑</kbd> <kbd>K</kbd></span><span class="kd">previous frame</span></div>
      <div class="kmrow"><span class="kk"><kbd>Space</kbd></span><span class="kd">skip — advance, never decides</span></div>
    </div></div>
    <div class="kmsec"><h3>Decide</h3><div class="kmgrid">
      <div class="kmrow"><span class="kk"><kbd>P</kbd></span><span class="kd">pick</span></div>
      <div class="kmrow"><span class="kk"><kbd>X</kbd></span><span class="kd">reject</span></div>
      <div class="kmrow"><span class="kk"><kbd>U</kbd></span><span class="kd">clear — back to undecided</span></div>
      <div class="kmrow"><span class="kk"><kbd>Return</kbd></span><span class="kd">commit stack: keep this + your picks, reject undecided, advance · pick+advance on singles · inert while rendering</span></div>
      <div class="kmrow"><span class="kk"><kbd>⌘Z</kbd> <kbd>⌫</kbd></span><span class="kd">undo — a stack commit undoes as one unit</span></div>
    </div></div>
    <div class="kmsec"><h3>Grade</h3><div class="kmgrid">
      <div class="kmrow"><span class="kk"><kbd>1</kbd>–<kbd>5</kbd></span><span class="kd">stars</span></div>
      <div class="kmrow"><span class="kk"><kbd>0</kbd></span><span class="kd">clear stars</span></div>
    </div></div>
    <div class="kmsec"><h3>Look closer</h3><div class="kmgrid">
      <div class="kmrow"><span class="kk"><kbd>Z</kbd></span><span class="kd">2× zoom — position sticks across frames in a stack</span></div>
      <div class="kmrow"><span class="kk"><kbd>⇧</kbd>+arrows</span><span class="kd">pan while zoomed (or drag)</span></div>
      <div class="kmrow"><span class="kk"><kbd>/</kbd></span><span class="kd">close-ups panel</span></div>
    </div></div>
    <div class="kmsec"><h3>Run control</h3><div class="kmgrid">
      <div class="kmrow"><span class="kk"><kbd>A</kbd></span><span class="kd">auto-advance on/off</span></div>
      <div class="kmrow"><span class="kk"><kbd>S</kbd></span><span class="kd">scope: everything · undecided · picks · rejects</span></div>
      <div class="kmrow"><span class="kk"><kbd>?</kbd></span><span class="kd">this map</span></div>
      <div class="kmrow"><span class="kk"><kbd>Esc</kbd></span><span class="kd">close overlay · zoom out</span></div>
    </div></div>
    <div class="kmsec stub"><h3>In the tutorial, not in this mockup</h3><div class="kmgrid">
      <div class="kmrow"><span class="kk"><kbd>⇧Z</kbd></span><span class="kd">zoom to nearest face / cycle faces</span></div>
      <div class="kmrow"><span class="kk"><kbd>I</kbd></span><span class="kd">EXIF overlay</span></div>
      <div class="kmrow"><span class="kk"><kbd>G</kbd> <kbd>C</kbd> <kbd>B</kbd></span><span class="kd">grid · compare · A/B for this stack</span></div>
      <div class="kmrow"><span class="kk"><kbd>6</kbd>–<kbd>9</kbd> <kbd>V</kbd> <kbd>-</kbd></span><span class="kd">color labels</span></div>
      <div class="kmrow"><span class="kk">⌘R</span><span class="kd">start card · lenses (this run: Everything)</span></div>
      <div class="kmrow"><span class="kk"></span><span class="kd">key remapping</span></div>
    </div></div>`;
  $("ovkeys").classList.add("on"); render();
}
function closeKeys(){ ui.keys = false; $("ovkeys").classList.remove("on"); }

function openComplete(){
  ui.complete = true;
  const c = counts(S);
  const row = (key, cls, num, lbl, act) =>
    `<div class="sumrow ${cls}" data-act="${act}"><kbd>${key}</kbd><span class="num">${num}</span>
     <span class="lbl">${lbl}</span><span class="jump">jump ›</span></div>`;
  $("completecard").innerHTML = `
    <h2>Run complete — June 14 · Red Rocks + strays</h2>
    <div class="sub">every count below is yours — tentative ✨ flags filled nothing</div>
    ${row(1,"p",c.picked,"Picked","picks")}
    ${row(2,"x",c.rejected,"Rejected","rejects")}
    ${row(3,"u",c.undecided,"Undecided","undecided")}
    ${row(4,"s",c.skipped,"Skipped","skipped")}
    ${row(5,"n",c.never,"Never viewed","never")}
    ${row(6,"g",c.ghosts,"✨ awaiting review","review")}
    <div class="footnote">hidden by lens 0 — this run used the Everything lens.</div>
    <div class="ceremonies">
      <button data-cer="review">Review AI suggestions (${c.ghosts})</button>
      <button data-cer="move">Move rejects…</button>
      <button data-cer="export">Export picks…</button>
      <button data-cer="saveset">Save picks as set</button>
    </div>
    <div class="footnote">Rejects are catalog flags — nothing was moved or deleted during the run.
      Ceremonies live here, after the run, never inside it. <kbd>Esc</kbd> resume · <kbd>⌘Z</kbd> undo last commit</div>`;
  $("ovcomplete").classList.add("on");
  document.querySelectorAll("#completecard .sumrow").forEach(el =>
    el.addEventListener("click", () => jumpScoped(el.dataset.act)));
  document.querySelectorAll("#completecard button").forEach(el =>
    el.addEventListener("click", () => ceremony(el.dataset.cer)));
}
function closeComplete(){ ui.complete = false; $("ovcomplete").classList.remove("on"); }
function jumpScoped(act){
  if(act === "review"){ openReview("complete"); return; }
  closeComplete();
  S.scope = act === "picks" ? "picks" : act === "rejects" ? "rejects"
          : act === "undecided" ? "undecided" : act === "skipped" ? "skipped" : "never";
  const first = FRAMES.find(f => inScope(S, f.gi));
  if(!first){ showToast(`Nothing in scope "${S.scope}" — clean`); S.scope = "all"; render(); return; }
  uiGoto(first.gi);
  showToast(`Scoped mini-run: ${S.scope} — S cycles back to everything`);
}
function ceremony(kind){
  const c = counts(S);
  const tentX = allGhosts().filter(f => f.ghost === "X" && !S.dec[f.gi]).length;
  if(kind === "review"){ openReview("complete"); return; }
  let title, body;
  if(kind === "move"){
    title = "Move rejects… (stub)";
    body = `Would move <b>${c.rejected}</b> user-rejected files to a folder or Trash — with a manifest, undoable.<br><br>
      <em>${tentX} frame${tentX===1?" carries":"s carry"} only a tentative ✨X and ${tentX===1?"is":"are"} excluded</em> —
      tentative flags never move files. Confirm them in Review AI suggestions first if you agree with them.`;
  } else if(kind === "export"){
    title = "Export picks… (stub)";
    body = `Would export <b>${c.picked}</b> picks.<br><br><em>✨P suggestions you haven't confirmed are not included</em> — unconfirmed AI never exports.`;
  } else {
    title = "Save picks as set (stub)";
    body = `Would save <b>${c.picked}</b> picks as the set “June 14 selects”. Tentative ✨ flags are not in the Picks set.`;
  }
  ui.stub = kind;
  $("stubcard").innerHTML = `<h2>${title}</h2><div class="sub">post-run ceremony — design stub</div>
    <div class="stubmsg">${body}</div><button data-close>Nothing happened — close (Esc)</button>`;
  $("ovstub").classList.add("on");
  document.querySelector("#stubcard [data-close]").addEventListener("click", closeStub);
}
function closeStub(){ ui.stub = null; $("ovstub").classList.remove("on"); }

function openReview(from){
  ui.review = true; ui.reviewFrom = from || null;
  if(from === "complete") $("ovcomplete").classList.remove("on");
  const bySi = {};
  allGhosts().forEach(f => { (bySi[f.si] = bySi[f.si] || []).push(f); });
  let h = "";
  Object.keys(bySi).forEach(si => {
    const st = STACKS[si];
    h += `<div class="revstack"><h4>${stackLabel(st)}</h4>` + bySi[si].map(f => {
      const d = S.dec[f.gi];
      const status = d
        ? `<span class="rgs replaced">replaced by your ${d === "P" ? "pick" : "reject"}</span>`
        : `<span class="rgs await">awaiting your review</span>`;
      return `<div class="revrow"><span class="rgk">✨${f.ghost}</span>
        <span class="rgn">frame ${f.idx+1} · ${f.file} — “${f.ghostNote}”</span>${status}</div>`;
    }).join("") + `</div>`;
  });
  const n = ghostsAwaiting(S).length;
  $("reviewcard").innerHTML = `
    <h2>Review AI suggestions</h2>
    <div class="sub">the only place tentative flags can become yours — nothing here has been confirmed</div>
    ${h}
    <div class="ceremonies">
      <button data-rv="confirm">Confirm ${n} awaiting (stub)</button>
      <button data-rv="dismiss">Dismiss all (stub)</button>
    </div>
    <div class="footnote">Confirming would flip origin → user in the catalog and write sidecars for eligible fields.
      No navigation or decision key ever confirms silently. <kbd>Esc</kbd> back</div>`;
  $("ovreview").classList.add("on");
  document.querySelectorAll("#reviewcard button").forEach(el =>
    el.addEventListener("click", () => {
      showToast(el.dataset.rv === "confirm"
        ? `Stub — would confirm ${ghostsAwaiting(S).length} suggestions (origin → user)`
        : "Stub — would remove all tentative flags and record the removals");
    }));
}
function closeReview(){
  ui.review = false; $("ovreview").classList.remove("on");
  if(ui.reviewFrom === "complete"){ $("ovcomplete").classList.add("on"); }
  ui.reviewFrom = null;
}

// ---------- zoom pan (drag = pointer twin of ⇧arrows) ----------
(function(){
  let dragging = false, lx = 0, ly = 0;
  const wrap = $("stagewrap");
  wrap.addEventListener("pointerdown", e => {
    if(!ui.zoom.on) return;
    dragging = true; lx = e.clientX; ly = e.clientY; wrap.setPointerCapture(e.pointerId);
  });
  wrap.addEventListener("pointermove", e => {
    if(!dragging) return;
    const r = wrap.getBoundingClientRect();
    ui.zoom.x = Math.max(0, Math.min(100, ui.zoom.x - (e.clientX - lx) / r.width * 100));
    ui.zoom.y = Math.max(0, Math.min(100, ui.zoom.y - (e.clientY - ly) / r.height * 100));
    lx = e.clientX; ly = e.clientY;
    $("art").style.transformOrigin = `${ui.zoom.x}% ${ui.zoom.y}%`;
  });
  wrap.addEventListener("pointerup", () => dragging = false);
})();

// ---------- keyboard ----------
const NOT_HERE = { i:"EXIF overlay", g:"Grid view", c:"Compare view", b:"A/B view",
  "6":"Color labels","7":"Color labels","8":"Color labels","9":"Color labels",
  v:"Color labels","-":"Clear color label" };

document.addEventListener("keydown", e => {
  const k = e.key, lk = k.toLowerCase();
  // undo works everywhere, one unit for commits
  if((e.metaKey || e.ctrlKey) && lk === "z"){
    e.preventDefault();
    if(ui.stub) closeStub();
    if(ui.review) closeReview();
    if(ui.complete) closeComplete();
    act(() => undo(S)); return;
  }
  if(e.metaKey || e.ctrlKey || e.altKey) return;   // don't eat browser chords

  // overlay routing
  if(ui.stub){ if(k === "Escape" || k === "Enter"){ e.preventDefault(); closeStub(); } return; }
  if(ui.review){ if(k === "Escape"){ e.preventDefault(); closeReview(); } return; }
  if(ui.keys){ if(k === "Escape" || k === "?"){ e.preventDefault(); closeKeys(); render(); } return; }
  if(ui.complete){
    e.preventDefault();
    if(k === "Escape"){ closeComplete(); return; }
    if(k === "Backspace"){ closeComplete(); act(() => undo(S)); return; }
    const acts = {1:"picks",2:"rejects",3:"undecided",4:"skipped",5:"never",6:"review"};
    if(acts[k]) jumpScoped(acts[k]);
    if(k === "?"){ closeComplete(); openKeys(); }
    return;
  }

  switch(true){
    case (k === "?"): e.preventDefault(); openKeys(); break;
    case (k === "Escape"):
      if(ui.zoom.on){ ui.zoom.on = false; render(); } break;
    case (k === "ArrowRight" || lk === "l"): e.preventDefault();
      if(ui.zoom.on && e.shiftKey && k === "ArrowRight"){ ui.zoom.x = Math.min(100, ui.zoom.x + 9); render(); }
      else act(() => nextStack(S));
      break;
    case (k === "ArrowLeft"  || lk === "h"): e.preventDefault();
      if(ui.zoom.on && e.shiftKey && k === "ArrowLeft"){ ui.zoom.x = Math.max(0, ui.zoom.x - 9); render(); }
      else act(() => prevStack(S));
      break;
    case (k === "ArrowDown"):
    case (lk === "j"): e.preventDefault();
      if(ui.zoom.on && e.shiftKey && k === "ArrowDown"){ ui.zoom.y = Math.min(100, ui.zoom.y + 9); render(); }
      else act(() => nextFrame(S));
      break;
    case (k === "ArrowUp"):
    case (lk === "k"): e.preventDefault();
      if(ui.zoom.on && e.shiftKey && k === "ArrowUp"){ ui.zoom.y = Math.max(0, ui.zoom.y - 9); render(); }
      else act(() => prevFrame(S));
      break;
    case (lk === "p" && !e.shiftKey): e.preventDefault(); act(() => decide(S, "P")); break;
    case (lk === "x" && !e.shiftKey): e.preventDefault(); act(() => decide(S, "X")); break;
    case (lk === "u"): e.preventDefault(); act(() => decide(S, null)); break;
    case (k === "Enter"):
      e.preventDefault();
      if(ui.shimmer){ flashShimmer(); break; }     // inert until rendered
      act(() => commit(S));
      break;
    case (k === " "): e.preventDefault(); act(() => skip(S)); break;
    case (k === "Backspace"): e.preventDefault(); act(() => undo(S)); break;
    case (lk === "z"):
      e.preventDefault();
      if(e.shiftKey){ showToast("⇧Z face zoom — not in this mockup"); break; }
      ui.zoom.on = !ui.zoom.on; render(); break;
    case (k === "/"): e.preventDefault(); ui.closeups = !ui.closeups; render(); break;
    case (lk === "a"): e.preventDefault(); S.autoAdv = !S.autoAdv;
      showToast(`Auto-advance ${S.autoAdv ? "on" : "off"}`); render(); break;
    case (lk === "s"): e.preventDefault(); cycleScope(S);
      showToast(`Scope: ${S.scope === "all" ? "everything" : S.scope}`); render(); break;
    case ("12345".includes(k)): e.preventDefault(); setStars(S, +k); render(); break;
    case (k === "0"): e.preventDefault(); setStars(S, 0); render(); break;
    case (!!NOT_HERE[lk]): e.preventDefault();
      showToast(`${NOT_HERE[lk]} — not in this mockup`); break;
  }
});

startShimmerIfNeeded();
render();
})();
</script>
</body>
</html>
