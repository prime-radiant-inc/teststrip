<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Teststrip — Cull Mockup E · Workstation v3</title>
<style>
/* ============================================================
   Mockup E — "Workstation v3" (round 3 of the Workstation line)
   Round-3 feedback baked in:
   1. The burst is on the LEFT RAIL, separate from the strip.
      You work one burst at a time, top to bottom — the rail is
      the working set and nothing else lives there. On a
      standalone photo the rail holds that single thumb with
      quiet "standalone" context (same width, no chrome
      collapse, J/K walk photos — no dead keys).
   2. The BOTTOM STRIP is the run: other bursts as compact
      count pills (machine-fact labels only), standalones as
      small thumbs, current stop highlighted, done stops
      checkmarked — the cross-run "how much is left" glance
      that round 2 lost.
   3. The RIGHT PANEL deepens: per-face close-up cards,
      prominence-ordered, each with ONE traffic-light roll-up
      dot, an identity chip when known, and assessment chips
      (eyes / expression / focus / facing / light). Context-
      qualified states (shut-ok) render distinctly and roll up
      GREEN. Background-tier faces are a dot-only row — chips
      on hover AND via F, no pointer dependency. Honest empty
      states: "no faces" and "faces too small to read", both in
      reserved space. Below the faces: the whole-frame reads.
   One home per fact:
     rail   → current burst: navigation + decision state
              (✦ ✨ P/X, rank tint, skip marks, stars)
     stage  → the photograph (+ transient shimmer/toast)
     right  → every machine read (faces, then whole frame)
     strip  → the run: cross-stop position (current/done/✨)
     status → position / progress / scope / auto-advance
   ============================================================ */
:root{
  --bg:#0b0c0f; --stage:#08090c; --panel:#12141a; --panel2:#181b22;
  --line:#252a34; --line2:#2e3442;
  --txt:#cfd4dd; --dim:#828a99; --faint:#5a6272;
  --acc:#57d0b8;           /* navigation / current */
  --gold:#e6b354;          /* ✦ recommendation */
  --pick:#4cd08a;          /* user pick / green roll-up */
  --rej:#ef6461;           /* user reject / red roll-up */
  --ghost:#b78df2;         /* ✨ tentative */
  --amber:#d9a13c;         /* mixed / too-close / amber roll-up */
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);
  font:11px/1.45 var(--sans);-webkit-font-smoothing:antialiased}
kbd{font:10px var(--mono);background:#1d212b;border:1px solid var(--line2);
  border-bottom-width:2px;border-radius:3px;padding:1px 5px;color:var(--txt);white-space:nowrap}
button{font:inherit;color:inherit;background:var(--panel2);border:1px solid var(--line2);
  border-radius:4px;padding:5px 12px;cursor:pointer}
button:hover{border-color:var(--acc);color:#fff}
button:focus-visible{outline:2px solid var(--acc);outline-offset:1px}
.microlabel{font:9px var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}

#app{height:100vh;display:grid;
  grid-template-columns:168px minmax(0,1fr) 318px;
  grid-template-rows:34px minmax(0,1fr) 48px 30px auto;
  grid-template-areas:"top top top" "rail center right" "strip strip strip" "status status status" "hint hint hint"}

/* ---------- top bar ---------- */
#topbar{grid-area:top;display:flex;align-items:center;gap:12px;padding:0 12px;
  background:var(--panel);border-bottom:1px solid var(--line)}
#topbar .brand{font:10px var(--mono);letter-spacing:.22em;color:var(--acc)}
#topbar .batch{font-weight:600;font-size:12px;color:#e8ebf0}
#topbar .lens{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--dim)}
#topbar .lens b{color:var(--txt);font-weight:600}

/* ---------- left rail: the current burst, and only that ---------- */
#rail{grid-area:rail;background:var(--panel);border-right:1px solid var(--line);
  display:flex;flex-direction:column;min-height:0}
#railhead{padding:8px 10px 7px;border-bottom:1px solid var(--line)}
#railhead .rmicro{font:9px var(--mono);letter-spacing:.14em;text-transform:uppercase;
  color:var(--faint);margin-bottom:3px}
#railhead .ltxt{font:600 10px var(--mono);color:#e8ebf0;line-height:1.4;word-break:break-all}
#railhead .lsub{display:flex;align-items:center;gap:8px;margin-top:4px;min-height:13px;flex-wrap:wrap}
#railhead .ldone{font:9px var(--mono);color:var(--pick)}
#railhead .lg{display:flex;align-items:center;gap:4px;font:8px var(--mono);color:var(--faint)}
#railhead .lg .grad{width:38px;height:4px;border-radius:2px;
  background:linear-gradient(90deg,#3ecf8e,#d9a13c,#e05252)}
#railhead .lnote{font:8px var(--mono);color:var(--faint);font-style:italic}
#railbanner{display:none;padding:5px 10px;font:9px var(--mono);color:var(--amber);
  background:rgba(217,161,60,.08);border-bottom:1px solid rgba(217,161,60,.35);line-height:1.5}
#railbanner.on{display:block}
#railcells{flex:1;min-height:0;overflow-y:auto;padding:8px;display:flex;
  flex-direction:column;gap:8px}
.rcell{width:100%;aspect-ratio:3/2;border-radius:5px;position:relative;cursor:pointer;flex:none;
  border:1px solid var(--line2);overflow:hidden;font:10px var(--mono)}
.rcell .bgart{position:absolute;inset:0}
.rcell .bgart svg{width:100%;height:100%;display:block}
.rcell:hover{border-color:var(--acc)}
.rcell.cur{border-color:var(--acc);box-shadow:0 0 0 2px var(--acc)}
.rcell.dimmed{opacity:.25}
.rcell.tooclose{border-color:rgba(217,161,60,.65)}
.rcell .n{position:absolute;left:6px;top:4px;color:#eef1f5;text-shadow:0 1px 2px rgba(0,0,0,.85);
  font-weight:600;font-size:11px}
.rcell .rec{position:absolute;right:5px;top:3px;color:var(--gold);font-size:13px;
  text-shadow:0 1px 3px rgba(0,0,0,.8)}
.rcell .tc{position:absolute;right:5px;top:3px;color:var(--amber);font-size:11px;
  text-shadow:0 1px 3px rgba(0,0,0,.8)}
.rcell .gho{position:absolute;right:5px;bottom:8px;color:var(--ghost);font-size:10px;
  text-shadow:0 1px 2px rgba(0,0,0,.8)}
.rcell .skp{position:absolute;left:6px;bottom:8px;color:#c6cbd6;font-size:9px;
  text-shadow:0 1px 2px rgba(0,0,0,.8)}
.rcell .stars{position:absolute;left:6px;bottom:20px;color:var(--gold);font-size:9px;
  text-shadow:0 1px 2px rgba(0,0,0,.8)}
.rcell .dec{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:22px}
.rcell .dec.P{background:rgba(76,208,138,.32);color:var(--pick)}
.rcell .dec.X{background:rgba(239,100,97,.34);color:var(--rej)}
.rcell .rk{position:absolute;left:0;right:0;bottom:0;height:4px}
.rcell .rk.unscored{background:repeating-linear-gradient(90deg,var(--faint) 0 4px,transparent 4px 8px)}

/* ---------- center stage: the photograph, nothing else ---------- */
#center{grid-area:center;display:flex;flex-direction:column;min-width:0;background:var(--stage)}
#stagebox{flex:1;position:relative;display:flex;align-items:center;justify-content:center;
  padding:14px 18px;min-height:0}
#stagewrap{position:relative;height:100%;aspect-ratio:3/2;max-width:100%;border-radius:6px;
  overflow:hidden;background:#000;box-shadow:0 0 0 1px var(--line),0 12px 40px rgba(0,0,0,.5)}
#art{position:absolute;inset:0;transition:transform .16s ease-out;will-change:transform}
#art svg{width:100%;height:100%;display:block}
#stagewrap.zoomed{cursor:grab}
#stagewrap.zoomed:active{cursor:grabbing}
#shimmer{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
  background:rgba(8,9,12,.72);z-index:5}
#shimmer.on{display:flex}
#shimmer .sheen{position:absolute;inset:0;background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.09) 50%,transparent 60%);
  background-size:250% 100%;animation:sheen .7s linear infinite}
#shimmer .word{font:11px var(--mono);color:var(--dim);letter-spacing:.2em;z-index:1}
#shimmer.flash .word{animation:flashword .22s ease-out}
@keyframes sheen{from{background-position:120% 0}to{background-position:-120% 0}}
@keyframes flashword{0%{transform:scale(1);color:var(--dim)}40%{transform:scale(1.35);color:#fff}100%{transform:scale(1)}}
@media (prefers-reduced-motion:reduce){#shimmer .sheen{animation:none;background:rgba(255,255,255,.05)}}
#toast{position:absolute;left:50%;bottom:26px;transform:translateX(-50%) translateY(8px);
  font:11px var(--mono);background:#1a1e27;border:1px solid var(--line2);border-radius:5px;
  padding:6px 14px;opacity:0;transition:opacity .18s,transform .18s;pointer-events:none;z-index:8;
  box-shadow:0 6px 20px rgba(0,0,0,.5)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---------- right panel: faces on top, whole-frame reads below ---------- */
#right{grid-area:right;background:var(--panel);border-left:1px solid var(--line);
  display:flex;flex-direction:column;min-height:0}
#facesec{flex:1;min-height:0;display:flex;flex-direction:column;border-bottom:1px solid var(--line)}
.rphead{display:flex;justify-content:space-between;align-items:baseline;padding:8px 12px 4px}
.rphead .k{font:9px var(--mono);color:var(--faint)}
#facelist{flex:1;min-height:0;overflow-y:auto;padding:2px 10px 10px}
.facestate{height:100%;display:flex;align-items:center;justify-content:center;
  color:var(--faint);font-style:italic;text-align:center;padding:0 16px;line-height:1.6}
.facenote{padding:2px 2px 6px;text-align:center;color:var(--pick);font-size:10px}
.fcard{display:flex;gap:8px;padding:6px;border:1px solid var(--line);border-radius:6px;
  margin-bottom:6px;background:var(--panel2)}
.fcard .fcrop{width:46px;height:46px;border-radius:6px;flex:none;display:flex;
  align-items:center;justify-content:center;font-size:24px;border:1px solid var(--line2)}
.fcard .fmeta{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px;justify-content:center}
.frow1{display:flex;align-items:center;gap:6px}
.fdot{width:9px;height:9px;border-radius:50%;flex:none;border:1px solid rgba(0,0,0,.5)}
.fdot.green,.bgdot.green{background:var(--pick)}
.fdot.amber,.bgdot.amber{background:var(--amber)}
.fdot.red,.bgdot.red{background:var(--rej)}
.fname{font:600 10px var(--mono);color:#e8ebf0;background:#232838;border:1px solid var(--line2);
  border-radius:99px;padding:1px 7px}
.ftier{font:8px var(--mono);color:var(--faint);letter-spacing:.1em;text-transform:uppercase;
  margin-left:auto}
.fchips{display:flex;flex-wrap:wrap;gap:3px}
.chip{font:8.5px var(--mono);padding:1px 6px;border-radius:3px;border:1px solid var(--line2);
  color:var(--dim);background:#161a22;white-space:nowrap}
.chip b{font-weight:400;color:var(--faint);margin-right:3px}
.chip.warn{border-color:rgba(217,161,60,.55);color:var(--amber)}
.chip.warn b{color:rgba(217,161,60,.6)}
.chip.bad{border-color:rgba(239,100,97,.6);color:var(--rej)}
.chip.bad b{color:rgba(239,100,97,.6)}
.chip.ctx{border-color:rgba(76,208,138,.6);color:var(--pick)}
.chip.ctx b{color:rgba(76,208,138,.6)}
.bgfaces{position:relative;display:flex;align-items:center;gap:8px;padding:7px 9px;
  border:1px dashed var(--line2);border-radius:6px;margin-bottom:6px}
.bgfaces .bgl{font:8px var(--mono);color:var(--faint);letter-spacing:.12em;text-transform:uppercase}
.bgfaces .bgkey{margin-left:auto;font:8px var(--mono);color:var(--faint)}
.bgdot{width:12px;height:12px;border-radius:50%;border:1px solid rgba(0,0,0,.5);cursor:default}
.bgdot .bgtip{display:none;position:absolute;left:8px;right:8px;bottom:calc(100% + 5px);
  z-index:20;background:#1a1e27;border:1px solid var(--line2);border-radius:5px;padding:7px 8px;
  box-shadow:0 8px 24px rgba(0,0,0,.6);pointer-events:none}
.bgdot:hover .bgtip{display:block}
#readsec{flex:none;padding:0 12px 10px}
#verdict{margin:2px 0 8px}
.pill{display:block;font:11px var(--mono);padding:5px 12px;border-radius:99px;
  border:1px solid var(--line2);background:var(--panel2);color:var(--txt);text-align:center;
  white-space:normal;line-height:1.4}
.pill.keep{border-color:rgba(87,208,184,.45);color:#8fe6d2}
.pill.toss{border-color:rgba(239,100,97,.45);color:#f4938f}
.pill.mixed{border-color:rgba(217,161,60,.45);color:#e5bc72}
.pill.close{border-color:rgba(217,161,60,.6);color:var(--amber);font-weight:600}
.pill.none{border-style:dashed;color:var(--faint);font-style:italic}
.sigrow{display:grid;grid-template-columns:44px 1fr 74px;gap:8px;align-items:center;margin:7px 0}
.sigrow .sn{font:9px var(--mono);letter-spacing:.1em;color:var(--dim)}
.sigrow .bar{height:5px;background:#1d212b;border-radius:3px;overflow:hidden}
.sigrow .bar i{display:block;height:100%;border-radius:3px;background:var(--acc)}
.sigrow .bar.na{background:repeating-linear-gradient(90deg,#1d212b 0 4px,#14161c 4px 8px)}
.sigrow .sv{font:10px var(--mono);color:var(--txt);text-align:right}
.sigrow .sv small{color:var(--faint);font-size:8px}
.rationale{margin-top:8px;padding:7px 9px;border-radius:4px;background:var(--panel2);
  border:1px solid var(--line);color:var(--dim);font-size:10.5px;line-height:1.5;min-height:50px}
.rationale.noread{color:var(--faint);font-style:italic}
#ghostslot{min-height:36px}
.ghostnote{margin-top:6px;padding:6px 9px;border-radius:4px;border:1px dashed rgba(183,141,242,.5);
  color:var(--ghost);font-size:10px;background:rgba(183,141,242,.06)}

/* ---------- bottom strip: the run — count pills + small thumbs ---------- */
#strip{grid-area:strip;background:var(--panel);border-top:1px solid var(--line);
  display:flex;align-items:center;gap:8px;padding:0 12px;overflow-x:auto;overflow-y:hidden}
.rpill{flex:none;display:inline-flex;align-items:center;gap:7px;height:34px;padding:0 11px;
  border:1px solid var(--line2);border-radius:17px;cursor:pointer;background:var(--panel2)}
.rpill .sw{width:9px;height:18px;border-radius:3px;flex:none}
.rpill .plabel{font:9px var(--mono);color:var(--dim);white-space:nowrap}
.rpill.cur{border-color:var(--acc);box-shadow:0 0 0 1px var(--acc)}
.rpill.cur .plabel{color:#e8ebf0}
.rpill:hover,.rthumb:hover{border-color:var(--acc)}
.rpill.dimmed,.rthumb.dimmed{opacity:.3}
.mk{font:10px var(--mono);flex:none}
.mk.ok{color:var(--pick)} .mk.gh{color:var(--ghost)}
.rthumb{flex:none;width:54px;height:36px;border-radius:4px;border:1px solid var(--line2);
  position:relative;overflow:hidden;cursor:pointer}
.rthumb .bgart{position:absolute;inset:0}
.rthumb .bgart svg{width:100%;height:100%;display:block}
.rthumb.cur{border-color:var(--acc);box-shadow:0 0 0 1px var(--acc)}
.rthumb .mk{position:absolute;right:3px;top:1px;text-shadow:0 1px 2px rgba(0,0,0,.9)}

/* ---------- status bar ---------- */
#status{grid-area:status;display:flex;align-items:center;gap:14px;padding:0 12px;
  background:var(--panel);border-top:1px solid var(--line);font:10px var(--mono);color:var(--dim)}
#counter{color:var(--txt);white-space:nowrap}
#counter b{color:#fff;font-weight:600}
#progresswrap{display:flex;align-items:center;gap:8px;flex:1;max-width:320px}
#progressbar{flex:1;height:5px;background:#1d212b;border-radius:3px;overflow:hidden}
#progressfill{height:100%;background:var(--acc);border-radius:3px;transition:width .2s}
.schip{padding:2px 8px;border-radius:3px;border:1px solid var(--line2);white-space:nowrap}
.schip b{color:var(--txt);font-weight:600}
.schip.on b{color:var(--acc)}
.schip.off{opacity:.6}
.schip.zoom{border-color:rgba(87,208,184,.5);color:var(--acc)}
#status .spacer{flex:1}

/* ---------- hint bar ---------- */
#hint{grid-area:hint;display:flex;align-items:center;justify-content:center;gap:10px;
  padding:5px 8px;background:#0e1013;border-top:1px solid var(--line);flex-wrap:wrap}
#hint span{color:var(--faint);font-size:10px}
#hint.gone{display:none}

/* ---------- overlays ---------- */
.overlay{position:fixed;inset:0;background:rgba(5,6,8,.78);display:none;
  align-items:center;justify-content:center;z-index:50}
.overlay.on{display:flex}
.card{background:var(--panel);border:1px solid var(--line2);border-radius:10px;
  padding:22px 26px;max-width:640px;width:92%;max-height:86vh;overflow-y:auto;
  box-shadow:0 24px 80px rgba(0,0,0,.7)}
.card h2{font-size:15px;font-weight:600;color:#fff;margin-bottom:2px}
.card .sub{color:var(--dim);font-family:var(--mono);font-size:10px;margin-bottom:14px}
.kmsec{margin-bottom:12px}
.kmsec h3{font:9px var(--mono);letter-spacing:.16em;text-transform:uppercase;
  color:var(--acc);margin-bottom:6px}
.kmgrid{display:grid;grid-template-columns:1fr 1fr;gap:3px 22px}
.kmrow{display:flex;gap:8px;align-items:baseline;font-size:11px}
.kmrow .kk{min-width:74px;text-align:right}
.kmrow .kd{color:var(--dim)}
.kmsec.stub .kmrow{opacity:.45}
.sumrow{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:5px;
  font-size:12px;cursor:pointer}
.sumrow:hover{background:var(--panel2)}
.sumrow .num{font:600 13px var(--mono);min-width:38px;text-align:right}
.sumrow .lbl{flex:1}
.sumrow .jump{color:var(--faint);font-size:10px}
.sumrow.p .num{color:var(--pick)} .sumrow.x .num{color:var(--rej)}
.sumrow.u .num{color:var(--txt)} .sumrow.s .num{color:var(--dim)}
.sumrow.n .num{color:var(--amber)} .sumrow.g .num{color:var(--ghost)}
.ceremonies{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;padding-top:14px;
  border-top:1px solid var(--line)}
.footnote{margin-top:12px;color:var(--faint);font-size:10px;line-height:1.5}
.revstack{margin-bottom:12px}
.revstack h4{font:600 11px var(--mono);color:var(--txt);margin-bottom:4px}
.revrow{display:flex;gap:10px;align-items:baseline;padding:3px 6px;font-size:11px}
.revrow .rgk{font:10px var(--mono);color:var(--ghost);min-width:28px}
.revrow .rgn{color:var(--dim);flex:1}
.revrow .rgs{font:9px var(--mono)}
.revrow .rgs.await{color:var(--ghost)}
.revrow .rgs.replaced{color:var(--faint);text-decoration:line-through}
.stubmsg{font-size:12px;line-height:1.6;color:var(--txt);margin-bottom:14px}
.stubmsg em{color:var(--ghost);font-style:normal}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:#262b36;border-radius:4px}
::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <span class="brand">TESTSTRIP · CULL</span>
    <span class="batch">June 14 — Red Rocks wedding + archive strays</span>
    <span class="lens">lens <b>Everything</b> · 0 hidden</span>
  </div>
  <div id="rail">
    <div id="railhead"></div>
    <div id="railbanner"></div>
    <div id="railcells"></div>
  </div>
  <div id="center">
    <div id="stagebox">
      <div id="stagewrap">
        <div id="art"></div>
        <div id="shimmer"><div class="sheen"></div><div class="word">RENDERING…</div></div>
      </div>
      <div id="toast"></div>
    </div>
  </div>
  <div id="right">
    <div id="facesec">
      <div class="rphead"><span class="microlabel">Faces</span><span class="k" id="facecount"></span></div>
      <div id="facelist"></div>
    </div>
    <div id="readsec">
      <div class="rphead" style="padding-left:0;padding-right:0"><span class="microlabel">Whole frame</span></div>
      <div id="verdict"></div>
      <div id="signals"></div>
      <div class="rationale" id="rationale"></div>
      <div id="ghostslot"></div>
    </div>
  </div>
  <div id="strip"></div>
  <div id="status">
    <span id="counter"></span>
    <div id="progresswrap"><div id="progressbar"><div id="progressfill"></div></div><span id="progresstext"></span></div>
    <span class="spacer"></span>
    <span class="schip zoom" id="zoomchip">Z 2× · ⇧arrows / drag pan</span>
    <span class="schip" id="scopechip"></span>
    <span class="schip" id="autochip"></span>
    <span class="schip">? keys</span>
  </div>
  <div id="hint">
    <span><kbd>→</kbd><kbd>←</kbd> stacks</span><span><kbd>↓</kbd><kbd>↑</kbd> frames</span>
    <span><kbd>P</kbd> pick</span><span><kbd>X</kbd> reject</span><span><kbd>U</kbd> clear</span>
    <span><kbd>⏎</kbd> commit stack</span><span><kbd>␣</kbd> skip</span>
    <span><kbd>Z</kbd> zoom</span><span><kbd>/</kbd> faces</span><span><kbd>F</kbd> bg faces</span>
    <span><kbd>1–5</kbd> stars</span><span><kbd>A</kbd> auto</span><span><kbd>S</kbd> scope</span>
    <span><kbd>⌘Z</kbd> undo</span><span><kbd>?</kbd> all keys (hides this bar)</span>

// ---- Per-face assessments (round 3) ----
// Vocabulary per the shared spec: every chip value has a grade;
// the roll-up dot is the worst grade across the five chips.
// Context-qualified eye states (shut-ok…) are GOOD states.
const FACE_TIERS = ["main","secondary","background"];
const CHIP_KINDS = ["eyes","expr","focus","facing","light"];
const CHIP_GRADES = {
  eyes:  { open:"good", partial:"warn", shut:"bad",

  expr:  { laugh:"good", smile:"good", neutral:"good", grimace:"warn", "mid-speech":"warn" },
  focus: { sharp:"good", soft:"warn", blurred:"bad" },
  facing:{ camera:"good", profile:"good", away:"warn", down:"warn" },
  light: { good:"good", blown:"warn", shadowed:"warn" },
};
function chipGrade(kind, val){ return CHIP_GRADES[kind][val] || "good"; }

function facesFor(fi){

function stackOf(fi){ return STACKS[FRAMES[fi].si]; }

    case "rejects":   return d === "X";

            <circle cx="352" cy="58" r="22" fill="${C.shape}" opacity=".85"/>
            <path d="M175 230 v-52 a35 35 0 0 1 70 0 v52" fill="none" stroke="${C.shape}" stroke-width="5"/>`;
    for(let r=0;r<3;r++) for(let c=0;c<9;c++)
      art += `<circle cx="${92+c*26}" cy="${244+r*11}" r="3" fill="${C.shape}" opacity=".5"/>`;
  } else if(st.kind === "kiss"){
    const sep = Math.max(0,(4-f.idx))*9;
    art += `<circle cx="210" cy="252" r="120" fill="${hsl(st.hue,st.sat,18)}"/>`;
    art += svgHead(176-sep, 128, 27, f.shut && f.shut.includes(0), C);
    art += svgHead(244+sep, 132, 27, f.shut && f.shut.includes(1), C);
    if(f.kissOK && f.idx >= 4){
      const hs = f.idx===5 ? 15 : 10;
      art += `<path transform="translate(210,84) scale(${hs/12})" d="M0 6 C-1 2 -8 0 -8 -5 a4.5 4.5 0 0 1 8-2 a4.5 4.5 0 0 1 8 2 C8 0 1 2 0 6 Z" fill="${C.shape}"/>`;
    }
  } else if(st.kind === "rings"){
    art += `<rect x="60" y="200" width="300" height="34" rx="6" fill="${hsl(st.hue,st.sat,20)}"/>
            <circle cx="185" cy="135" r="40" fill="none" stroke="${C.shape}" stroke-width="9"/>
            <circle cx="235" cy="135" r="40" fill="none" stroke="${hsl(st.hue,st.sat+14,64)}" stroke-width="9"/>
            <path d="M262 86 l4 10 10 4 -10 4 -4 10 -4-10 -10-4 10-4 Z" fill="${C.label}"/>`;
  } else if(st.kind === "toss"){
    const t = f.idx/11, bx = 50+320*t, by = 232-560*t*(1-t);
    art += `<path d="M50 232 Q210 -46 370 232" fill="none" stroke="${C.shape}" stroke-width="1.6" stroke-dasharray="3 7" opacity=".5"/>`;
    for(let i=0;i<6;i++){
      const x = 70+i*56;
      art += svgHead(x, 252, 13, false, C);
      art += `<path d="M${x-16} 248 l-8 -20 M${x+16} 248 l8 -20" stroke="${C.shape}" stroke-width="3" stroke-linecap="round"/>`;
    }
    art += `<g><circle cx="${bx}" cy="${by}" r="10" fill="${C.shape}"/>`;
    for(let k=0;k<5;k++){ const a = k*1.257;
      art += `<circle cx="${bx+Math.cos(a)*12}" cy="${by+Math.sin(a)*12}" r="4.6" fill="${hsl(st.hue,st.sat+16,66)}"/>`; }
    art += `<path d="M${bx} ${by+12} q4 14 -2 26" stroke="${C.shape}" stroke-width="2.4" fill="none"/></g>`;
  } else if(st.kind === "scan"){
    const rot = f.rot || 0;
    art += `<g transform="rotate(${rot} 210 140)">
      <rect x="52" y="26" width="316" height="228" fill="hsl(42,22%,82%)"/>
      <rect x="72" y="44" width="276" height="176" fill="${hsl(st.hue,st.sat+8,42)}"/>
      ${svgHead(210, 132, 40, false, {shape:hsl(st.hue,st.sat+14,66), ink:hsl(st.hue,30,18)})}
      <circle cx="210" cy="86" r="15" fill="${hsl(st.hue,st.sat+14,66)}" stroke="${hsl(st.hue,30,18)}" stroke-width="1.5"/>
      <text x="330" y="242" font-size="11" fill="hsl(32,30%,40%)" text-anchor="end" font-family="monospace">1974</text></g>`;
  } else if(st.kind === "phone"){
    art += `<rect x="0" y="196" width="420" height="84" fill="${hsl(st.hue,st.sat,17)}"/>`;
    [140,210,280].forEach((x,i)=> art += svgHead(x, 150, 23, f.shut && f.shut.includes(i), C));
    art += `<text x="404" y="264" font-size="15" fill="hsl(28,90%,60%)" text-anchor="end" font-family="monospace" opacity=".85">06·14·2009</text>`;
  } else if(st.kind === "ted"){
    art += `<rect x="130" y="196" width="160" height="90" rx="20" fill="${C.shape}" opacity=".75"/>`;
    art += svgHead(210, 128, 52, f.shut && f.shut.includes(0), C);
  }
  const artLabel = `${st.name}${st.n>1 ? ` · ${f.idx+1}/${st.n}` : ""}`;
  return `<svg viewBox="0 0 420 280" preserveAspectRatio="xMidYMid slice">
    <defs><linearGradient id="g${f.gi}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${C.bgB}"/><stop offset="1" stop-color="${C.bgA}"/>
    </linearGradient></defs>
    <rect width="420" height="280" fill="url(#g${f.gi})"/>
    <g style="filter:blur(${f.blur||0}px)">${art}
      <text x="16" y="264" font-size="21" font-weight="600" font-family="-apple-system,sans-serif"
        fill="rgba(255,255,255,.88)" stroke="rgba(0,0,0,.45)" stroke-width="3"
        style="paint-order:stroke">${artLabel}</text></g></svg>`;
}

// ---------- render ----------
function render(){
  renderStage(); renderRail(); renderRight(); renderStrip(); renderStatus();
  const rc = document.querySelector("#railcells .rcell.cur");
  if(rc) rc.scrollIntoView({block:"nearest"});
  const sc = document.querySelector("#strip .cur");
  if(sc) sc.scrollIntoView({block:"nearest", inline:"nearest"});
}

function renderStage(){
  const f = FRAMES[S.cur], st = STACKS[f.si];
  $("art").innerHTML = motif(st, f);
  $("art").style.transform = ui.zoom.on ? "scale(2)" : "none";
  $("art").style.transformOrigin = `${ui.zoom.x}% ${ui.zoom.y}%`;
  $("stagewrap").classList.toggle("zoomed", ui.zoom.on);
  $("shimmer").classList.toggle("on", ui.shimmer);
}

// ---------- left rail: the current burst, worked top-to-bottom ----------
function railCellHTML(fi){
  const f = FRAMES[fi], st = STACKS[f.si], d = S.dec[fi];
  const rk = f.rankT != null ? rankColor(f.rankT) : null;
  const stn = S.stars[fi];
  return `<span class="rcell${fi===S.cur?" cur":""}${!inScope(S,fi)?" dimmed":""}${f.tooClose?" tooclose":""}" data-fi="${fi}">
    <span class="bgart">${motif(st, f)}</span>
    <span class="n">${f.idx+1}</span>
    ${f.rec?'<span class="rec">✦</span>':""}
    ${f.tooClose?'<span class="tc">≈</span>':""}
    ${(f.ghost && !d)?`<span class="gho">✨${f.ghost}</span>`:""}
    ${(S.skipped[fi] && !d)?'<span class="skp">› skipped</span>':""}
    ${stn?`<span class="stars">${"★".repeat(stn)}</span>`:""}
    ${d?`<span class="dec ${d}">${d}</span>`:""}
    ${rk?`<span class="rk" style="background:${rk.solid}"></span>`:'<span class="rk unscored"></span>'}</span>`;
}
function renderRail(){
  const f = FRAMES[S.cur], st = STACKS[f.si];
  const done = stackDecided(S, f.si);
  const single = st.n === 1;
  // header: machine-fact identity + rank legend / quiet standalone context
  const sub = single
    ? `<span class="lnote">standalone — <kbd>J</kbd><kbd>K</kbd> walk photos</span>`
    : st.unscored
      ? `<span class="lnote">unranked — no read yet</span>`
      : `<span class="lg"><span>best</span><span class="grad"></span><span>worst</span></span>`;
  $("railhead").innerHTML =
    `<div class="rmicro">${single ? "standalone" : "current burst"}</div>
     <div class="ltxt">${stackLabel(st)}</div>
     <div class="lsub">${sub}${done?'<span class="ldone">✓ decided</span>':""}</div>`;
  // too-close banner, pinned (never a fabricated #1)
  const bn = $("railbanner");
  if(st.tooClose){
    bn.textContent = `≈ too close to call — ${st.tooClose.map(i=>i+1).join("·")} · no ✦ awarded`;
    bn.classList.add("on");
  } else { bn.textContent = ""; bn.classList.remove("on"); }
  // the working set: every frame of this stop, generous thumbs
  let cells = "";
  for(let i = st.start; i < st.start + st.n; i++) cells += railCellHTML(i);
  $("railcells").innerHTML = cells;
  document.querySelectorAll("#railcells .rcell").forEach(el =>
    el.addEventListener("click", () => uiGoto(+el.dataset.fi)));
}

// ---------- right panel: faces first, whole-frame reads below ----------
function chipHTML(kind, val){
  const g = chipGrade(kind, val);
  const cls = ctxQualified(val) ? "ctx" : g === "bad" ? "bad" : g === "warn" ? "warn" : "";
  const disp = val === "shut-ok(kiss)" ? "shut · ok (kiss)"
             : val === "shut-ok(laugh)" ? "shut · ok (laugh)" : val;
  return `<span class="chip ${cls}"><b>${kind}</b>${disp}</span>`;
}
function faceEmoji(st, face){
  if(st.key === "grandma") return "👵";
  if(face.facing === "away") return "👤";
  if(face.eyes === "shut" && face.expr === "grimace") return "😖";
  if(ctxQualified(face.eyes)) return "😚";
  if(face.eyes === "shut") return "😌";
  if(face.eyes === "partial") return "😑";
  if(face.expr === "grimace") return "😬";
  if(face.expr === "laugh") return "😄";
  if(face.expr === "mid-speech") return "😮";
  return face.expr === "smile" ? "🙂" : "😐";
}
function faceCardHTML(st, face){
  const roll = faceRollup(face);
  return `<div class="fcard">
    <span class="fcrop" style="background:${hsl(st.hue,st.sat,20)}">${faceEmoji(st,face)}</span>
    <span class="fmeta">
      <span class="frow1"><span class="fdot ${roll}" title="roll-up: ${roll}"></span>
        ${face.name?`<span class="fname">${face.name}</span>`:""}
        <span class="ftier">${face.tier}</span></span>
      <span class="fchips">${CHIP_KINDS.map(k => chipHTML(k, face[k])).join("")}</span>
    </span></div>`;
}
function bgRowHTML(bg){
  const dots = bg.map(x => {
    const roll = faceRollup(x);
    return `<span class="bgdot ${roll}" title="background face — roll-up: ${roll}">
      <span class="bgtip"><span class="fchips">${CHIP_KINDS.map(k => chipHTML(k, x[k])).join("")}</span></span></span>`;
  }).join("");
  return `<div class="bgfaces"><span class="bgl">background</span>${dots}
    <span class="bgkey"><kbd>F</kbd> or hover for chips</span></div>`;
}
function renderRight(){
  const f = FRAMES[S.cur];
  const fr = facesFor(S.cur);
  // faces header count (honest: only what the machine actually holds)
  $("facecount").textContent =
    fr.state === "faces" ? `${fr.faces.length} face${fr.faces.length>1?"s":""}` :
    fr.state === "tooSmall" ? "faces detected" : "";
  const fl = $("facelist");
  if(!ui.closeups){
    fl.innerHTML = `<div class="facestate">close-ups hidden · <kbd>/</kbd> to show</div>`;
  } else if(fr.state === "none"){
    fl.innerHTML = `<div class="facestate">No faces in this frame</div>`;
  } else if(fr.state === "tooSmall"){
    fl.innerHTML = `<div class="facestate">Faces too small to read — the panel won't invent chips</div>`;
  } else {
    const st = STACKS[f.si];
    const ordered = orderFaces(fr.faces);
    const fg = ordered.filter(x => x.tier !== "background");
    const bg = ordered.filter(x => x.tier === "background");
    let h = "";
    if(fr.faces.some(x => ctxQualified(x.eyes)))
      h += `<div class="facenote">eyes shut — a good state here (kiss)</div>`;
    h += fg.map(x => faceCardHTML(st, x)).join("");
    if(bg.length) h += ui.bgFaces ? bg.map(x => faceCardHTML(st, x)).join("") : bgRowHTML(bg);
    fl.innerHTML = h;
  }
  // whole-frame verdict
  let cls = "none", txt = "No read yet";
  if(f.pill){
    txt = f.pill;
    cls = f.tooClose ? "close"
        : f.pill.startsWith("Keep") ? "keep"
        : f.pill.startsWith("Toss") ? "toss" : "mixed";
    if(cls === "close") txt = "≈ " + txt;
  }
  $("verdict").innerHTML = `<span class="pill ${cls}">${txt}</span>`;
  // signals
  const sig = (name, v, tag) => {
    if(v == null) return `<div class="sigrow"><span class="sn">${name}</span><span class="bar na"></span><span class="sv"><small>—</small></span></div>`;
    return `<div class="sigrow"><span class="sn">${name}</span>
      <span class="bar"><i style="width:${Math.round(v*100)}%"></i></span>
      <span class="sv">${v.toFixed(2)}${tag?` <small>${tag}</small>`:""}</span></div>`;
  };
  $("signals").innerHTML =
    sig("FOCUS", f.focus ?? null) +
    sig("EYES",  f.eyes  ?? null, f.kissOK ? "shut·OK" : null) +
    sig("SMILE", f.smile ?? null);
  // rationale — explains the read's honesty; never repeats the verdict
  const rat = $("rationale");
  if(!f.pill){
    rat.className = "rationale noread";
    rat.textContent = "No signals have run on this frame — the mode won't invent a verdict.";
  } else if(f.tooClose){
    rat.className = "rationale";
    rat.textContent = "The top frames are within the signals' noise floor — no ✦ is awarded that the read can't defend. C compares them head-to-head (not in this mockup).";
  } else {
    rat.className = "rationale";
    rat.textContent = "Claims are score-gated — a signal appears only when it genuinely separates the frames.";
  }
  $("ghostslot").innerHTML = (f.ghost && !S.dec[S.cur])
    ? `<div class="ghostnote">✨${f.ghost} autopilot: ${f.ghostNote} — tentative; counts for nothing until you review it.</div>` : "";
}

// ---------- bottom strip: the run — every stop at a glance ----------
function renderStrip(){
  const curSi = FRAMES[S.cur].si;
  let h = "";
  STACKS.forEach((st, si) => {
    const done = stackDecided(S, si);
    const gh = st.frames.filter(fr => fr.ghost && !S.dec[fr.gi]).length;
    const dim = stackScopeFrames(S, si).length === 0 ? " dimmed" : "";
    const cur = si === curSi ? " cur" : "";
    if(st.n > 1){
      const C = stackCols(st);
      h += `<span class="rpill${cur}${dim}" data-si="${si}" title="${stackLabel(st)}">
        <span class="sw" style="background:linear-gradient(180deg,${C.bgB},${C.shape})"></span>
        <span class="plabel">${stackLabel(st)}</span>
        ${done?'<span class="mk ok">✓</span>':(gh?`<span class="mk gh">✨${gh}</span>`:"")}</span>`;
    } else {
      const fr0 = st.frames[0], d = S.dec[fr0.gi];
      h += `<span class="rthumb${cur}${dim}" data-si="${si}" title="${stackLabel(st)}">
        <span class="bgart">${motif(st, fr0)}</span>
        ${d?'<span class="mk ok">✓</span>':(fr0.ghost?'<span class="mk gh">✨</span>':"")}</span>`;
    }
  });
  $("strip").innerHTML = h;
  document.querySelectorAll("#strip .rpill, #strip .rthumb").forEach(el =>
    el.addEventListener("click", () => uiGoto(landing(+el.dataset.si))));
}

function renderStatus(){
  const f = FRAMES[S.cur], st = STACKS[f.si];
  $("counter").innerHTML = `<b>${S.cur+1}</b> of ${TOTAL} · stack <b>${f.si+1}</b> of ${NSTACKS} · frame <b>${f.idx+1}</b> of ${st.n} · ${f.file}`;
  const c = counts(S), dec = c.picked + c.rejected;
  $("progressfill").style.width = (dec/TOTAL*100) + "%";
  $("progresstext").textContent = `${dec}/${TOTAL} decided`;
  const scopeN = FRAMES.filter(fr => inScope(S, fr.gi)).length;
  $("scopechip").innerHTML = `S scope <b>${S.scope === "all" ? "everything" : S.scope}</b>${S.scope!=="all"?` (${scopeN})`:""}`;
  $("autochip").innerHTML = `A auto-advance <b>${S.autoAdv?"ON":"OFF"}</b>`;
  $("autochip").className = "schip " + (S.autoAdv ? "on" : "off");
  $("zoomchip").style.display = ui.zoom.on ? "inline" : "none";
  $("hint").classList.toggle("gone", ui.hintGone);
}

// ---------- action plumbing + shimmer (Return-inert gate) ----------
function act(fn){
  const prevSi = FRAMES[S.cur].si;
  const eff = fn() || {};
  if(FRAMES[S.cur].si !== prevSi){ ui.zoom.on = false; ui.zoom.x = ui.zoom.y = 50; } // zoom sticks within a stack only
  startShimmerIfNeeded();
  if(eff.toast) showToast(eff.toast);
  if(eff.completed) openComplete();
  render();
}
function uiGoto(fi){ act(() => { gotoFrame(S, fi); }); }
function startShimmerIfNeeded(){
  clearTimeout(ui.shimmerTimer);
  if(ui.renderedOnce[S.cur]){ ui.shimmer = false; return; }  // revisits are prefetched — instant
  ui.renderedOnce[S.cur] = true;
  ui.shimmer = true;
  ui.shimmerTimer = setTimeout(() => { ui.shimmer = false; $("shimmer").classList.remove("flash"); render(); }, 250);
}
function flashShimmer(){
  const el = $("shimmer");
  el.classList.remove("flash"); void el.offsetWidth; el.classList.add("flash");
  showToast("rendering… Return is inert until the frame is at decision quality");
}

// ---------- toast ----------
let toastTimer = null;
function showToast(msg){
  const t = $("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 1800);
}

    </div>
    <div class="footnote">Rejects are catalog flags — nothing was moved or deleted during the run.
      Ceremonies live here, after the run, never inside it. <kbd>Esc</kbd> resume · <kbd>⌘Z</kbd> undo last commit</div>`;
  $("ovcomplete").classList.add("on");
  document.querySelectorAll("#completecard .sumrow").forEach(el =>
    el.addEventListener("click", () => jumpScoped(el.dataset.act)));
  document.querySelectorAll("#completecard button").forEach(el =>
    el.addEventListener("click", () => ceremony(el.dataset.cer)));
}
function closeComplete(){ ui.complete = false; $("ovcomplete").classList.remove("on"); }
function jumpScoped(act){
  if(act === "review"){ openReview("complete"); return; }
  closeComplete();
  S.scope = act === "picks" ? "picks" : act === "rejects" ? "rejects"
          : act === "undecided" ? "undecided" : act === "skipped" ? "skipped" : "never";
  const first = FRAMES.find(f => inScope(S, f.gi));
  if(!first){ showToast(`Nothing in scope "${S.scope}" — clean`); S.scope = "all"; render(); return; }
  uiGoto(first.gi);
  showToast(`Scoped mini-run: ${S.scope} — S cycles back to everything`);
}
function ceremony(kind){
  const c = counts(S);
  const tentX = allGhosts().filter(f => f.ghost === "X" && !S.dec[f.gi]).length;
  if(kind === "review"){ openReview("complete"); return; }
  let title, body;
  if(kind === "move"){
    title = "Move rejects… (stub)";
    body = `Would move <b>${c.rejected}</b> user-rejected files to a folder or Trash — with a manifest, undoable.<br><br>
      <em>${tentX} frame${tentX===1?" carries":"s carry"} only a tentative ✨X and ${tentX===1?"is":"are"} excluded</em> —
      tentative flags never move files. Confirm them in Review AI suggestions first if you agree with them.`;
  } else if(kind === "export"){
    title = "Export picks… (stub)";
    body = `Would export <b>${c.picked}</b> picks.<br><br><em>✨P suggestions you haven't confirmed are not included</em> — unconfirmed AI never exports.`;
  } else {
    title = "Save picks as set (stub)";
    body = `Would save <b>${c.picked}</b> picks as the set “June 14 selects”. Tentative ✨ flags are not in the Picks set.`;
  }
  ui.stub = kind;
  $("stubcard").innerHTML = `<h2>${title}</h2><div class="sub">post-run ceremony — design stub</div>
    <div class="stubmsg">${body}</div><button data-close>Nothing happened — close (Esc)</button>`;
  $("ovstub").classList.add("on");
  document.querySelector("#stubcard [data-close]").addEventListener("click", closeStub);
}
function closeStub(){ ui.stub = null; $("ovstub").classList.remove("on"); }

function openReview(from){
  ui.review = true; ui.reviewFrom = from || null;
  if(from === "complete") $("ovcomplete").classList.remove("on");
  const bySi = {};
  allGhosts().forEach(f => { (bySi[f.si] = bySi[f.si] || []).push(f); });
  let h = "";
  Object.keys(bySi).forEach(si => {
    const st = STACKS[si];
    h += `<div class="revstack"><h4>${stackLabel(st)}</h4>` + bySi[si].map(f => {
      const d = S.dec[f.gi];
      const status = d
        ? `<span class="rgs replaced">replaced by your ${d === "P" ? "pick" : "reject"}</span>`
        : `<span class="rgs await">awaiting your review</span>`;
      return `<div class="revrow"><span class="rgk">✨${f.ghost}</span>
        <span class="rgn">frame ${f.idx+1} · ${f.file} — “${f.ghostNote}”</span>${status}</div>`;
    }).join("") + `</div>`;
  });
  const n = ghostsAwaiting(S).length;
  $("reviewcard").innerHTML = `
    <h2>Review AI suggestions</h2>
    <div class="sub">the only place tentative flags can become yours — nothing here has been confirmed</div>
    ${h}
    <div class="ceremonies">
      <button data-rv="confirm">Confirm ${n} awaiting (stub)</button>
      <button data-rv="dismiss">Dismiss all (stub)</button>
    </div>
    <div class="footnote">Confirming would flip origin → user in the catalog and write sidecars for eligible fields.
      No navigation or decision key ever confirms silently. <kbd>Esc</kbd> back</div>`;
  $("ovreview").classList.add("on");
  document.querySelectorAll("#reviewcard button").forEach(el =>
    el.addEventListener("click", () => {
      showToast(el.dataset.rv === "confirm"
        ? `Stub — would confirm ${ghostsAwaiting(S).length} suggestions (origin → user)`
        : "Stub — would remove all tentative flags and record the removals");
    }));
}
function closeReview(){
  ui.review = false; $("ovreview").classList.remove("on");
  if(ui.reviewFrom === "complete"){ $("ovcomplete").classList.add("on"); }
  ui.reviewFrom = null;
}

// ---------- zoom pan (drag = pointer twin of ⇧arrows) ----------
(function(){
  let dragging = false, lx = 0, ly = 0;
  const wrap = $("stagewrap");
  wrap.addEventListener("pointerdown", e => {
    if(!ui.zoom.on) return;
    dragging = true; lx = e.clientX; ly = e.clientY; wrap.setPointerCapture(e.pointerId);
  });
  wrap.addEventListener("pointermove", e => {
    if(!dragging) return;
    const r = wrap.getBoundingClientRect();
    ui.zoom.x = Math.max(0, Math.min(100, ui.zoom.x - (e.clientX - lx) / r.width * 100));
    ui.zoom.y = Math.max(0, Math.min(100, ui.zoom.y - (e.clientY - ly) / r.height * 100));
    lx = e.clientX; ly = e.clientY;
    $("art").style.transformOrigin = `${ui.zoom.x}% ${ui.zoom.y}%`;
  });
  wrap.addEventListener("pointerup", () => dragging = false);
})();

// ---------- keyboard ----------
const NOT_HERE = { i:"EXIF overlay", g:"Grid view", c:"Compare view", b:"A/B view",
  "6":"Color labels","7":"Color labels","8":"Color labels","9":"Color labels",
  v:"Color labels","-":"Clear color label" };

document.addEventListener("keydown", e => {
  const k = e.key, lk = k.toLowerCase();
  // undo works everywhere, one unit for commits
  if((e.metaKey || e.ctrlKey) && lk === "z"){
    e.preventDefault();
    if(ui.stub) closeStub();
    if(ui.review) closeReview();
    if(ui.complete) closeComplete();
    act(() => undo(S)); return;
  }
  if(e.metaKey || e.ctrlKey || e.altKey) return;   // don't eat browser chords

  // overlay routing
  if(ui.stub){ if(k === "Escape" || k === "Enter"){ e.preventDefault(); closeStub(); } return; }
  if(ui.review){ if(k === "Escape"){ e.preventDefault(); closeReview(); } return; }
  if(ui.keys){ if(k === "Escape" || k === "?"){ e.preventDefault(); closeKeys(); render(); } return; }
  if(ui.complete){
    e.preventDefault();
    if(k === "Escape"){ closeComplete(); return; }
    if(k === "Backspace"){ closeComplete(); act(() => undo(S)); return; }
    const acts = {1:"picks",2:"rejects",3:"undecided",4:"skipped",5:"never",6:"review"};
    if(acts[k]) jumpScoped(acts[k]);
    if(k === "?"){ closeComplete(); openKeys(); }
    return;
  }

  switch(true){
    case (k === "?"): e.preventDefault(); openKeys(); break;
    case (k === "Escape"):
      if(ui.zoom.on){ ui.zoom.on = false; render(); } break;
    case (k === "ArrowRight" || lk === "l"): e.preventDefault();
      if(ui.zoom.on && e.shiftKey && k === "ArrowRight"){ ui.zoom.x = Math.min(100, ui.zoom.x + 9); render(); }
      else act(() => nextStack(S));
      break;
    case (k === "ArrowLeft"  || lk === "h"): e.preventDefault();
      if(ui.zoom.on && e.shiftKey && k === "ArrowLeft"){ ui.zoom.x = Math.max(0, ui.zoom.x - 9); render(); }
      else act(() => prevStack(S));
      break;
    case (k === "ArrowDown"):
    case (lk === "j"): e.preventDefault();
      if(ui.zoom.on && e.shiftKey && k === "ArrowDown"){ ui.zoom.y = Math.min(100, ui.zoom.y + 9); render(); }
      else act(() => nextFrame(S));
      break;
    case (k === "ArrowUp"):
    case (lk === "k"): e.preventDefault();
      if(ui.zoom.on && e.shiftKey && k === "ArrowUp"){ ui.zoom.y = Math.max(0, ui.zoom.y - 9); render(); }
      else act(() => prevFrame(S));
      break;
    case (lk === "p" && !e.shiftKey): e.preventDefault(); act(() => decide(S, "P")); break;
    case (lk === "x" && !e.shiftKey): e.preventDefault(); act(() => decide(S, "X")); break;
    case (lk === "u"): e.preventDefault(); act(() => decide(S, null)); break;
    case (k === "Enter"):
      e.preventDefault();
      if(ui.shimmer){ flashShimmer(); break; }     // inert until rendered
      act(() => commit(S));
      break;
    case (k === " "): e.preventDefault(); act(() => skip(S)); break;
    case (k === "Backspace"): e.preventDefault(); act(() => undo(S)); break;
    case (lk === "z"):
      e.preventDefault();
      if(e.shiftKey){ showToast("⇧Z face zoom — not in this mockup"); break; }
      ui.zoom.on = !ui.zoom.on; render(); break;
    case (k === "/"): e.preventDefault(); ui.closeups = !ui.closeups; render(); break;
    case (lk === "f"): e.preventDefault(); ui.bgFaces = !ui.bgFaces;
      showToast(`Background-face chips ${ui.bgFaces ? "expanded" : "collapsed"}`); render(); break;
    case (lk === "a"): e.preventDefault(); S.autoAdv = !S.autoAdv;
      showToast(`Auto-advance ${S.autoAdv ? "on" : "off"}`); render(); break;
    case (lk === "s"): e.preventDefault(); cycleScope(S);
      showToast(`Scope: ${S.scope === "all" ? "everything" : S.scope}`); render(); break;
    case ("12345".includes(k)): e.preventDefault(); setStars(S, +k); render(); break;
    case (k === "0"): e.preventDefault(); setStars(S, 0); render(); break;
    case (!!NOT_HERE[lk]): e.preventDefault();
      showToast(`${NOT_HERE[lk]} — not in this mockup`); break;
  }
});

startShimmerIfNeeded();
render();
})();
</script>
</body>
</html>
